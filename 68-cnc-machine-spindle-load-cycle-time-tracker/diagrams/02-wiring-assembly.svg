<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
    <marker id="ar-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
  </defs>
  <rect width="800" height="540" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">DIN-rail layout · Cat6 to CNC · 24 VDC panel power</text>

  <!-- Top row: DIN-rail devices -->
  <rect x="20" y="100" width="140" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(86,112) scale(0.65)" fill="#7c2d12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="90" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">HDR-15-24</text>
  <text x="90" y="168" text-anchor="middle" font-size="11" fill="#9a3412">24 VDC supply</text>
  <text x="90" y="188" text-anchor="middle" font-size="10" fill="#c2410c" font-style="italic">often in panel</text>

  <rect x="190" y="100" width="180" height="100" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(271,112) scale(0.65)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="280" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Arduino OPTA</text>
  <text x="280" y="168" text-anchor="middle" font-size="11" fill="#854d0e">RS485 variant</text>
  <text x="280" y="188" text-anchor="middle" font-size="10" fill="#a16207">+24V · GND · RJ45</text>

  <rect x="400" y="100" width="190" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(485,112) scale(0.65)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="495" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Wireless for OPTA</text>
  <text x="495" y="168" text-anchor="middle" font-size="11" fill="#1e40af">Notecard expansion</text>
  <text x="495" y="188" text-anchor="middle" font-size="10" fill="#1e40af">SMA × 2 · +24V shared</text>

  <rect x="620" y="100" width="160" height="100" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <g transform="translate(691,112) scale(0.65)" fill="#0f172a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="700" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Antennas</text>
  <text x="700" y="168" text-anchor="middle" font-size="11" fill="#334155">primary + diversity</text>
  <text x="700" y="188" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">via cable glands</text>

  <!-- Top-row arrows + labels -->
  <line x1="160" y1="150" x2="188" y2="150" stroke="#a16207" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-brown)"/>
  <text x="174" y="140" text-anchor="middle" font-size="9" fill="#a16207">+24 V</text>
  <line x1="370" y1="150" x2="398" y2="150" stroke="#475569" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-gray)"/>
  <text x="384" y="140" text-anchor="middle" font-size="9" fill="#475569">I²C</text>
  <line x1="590" y1="150" x2="618" y2="150" stroke="#475569" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-gray)"/>
  <text x="604" y="140" text-anchor="middle" font-size="9" fill="#475569">SMA</text>

  <!-- Modbus TCP section -->
  <text x="400" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Modbus TCP — point-to-point Cat6</text>
  <text x="400" y="258" text-anchor="middle" font-size="10" fill="#3730a3" font-style="italic">private /24 subnet · no shop-floor LAN</text>

  <!-- OPTA endpoint -->
  <rect x="220" y="280" width="160" height="80" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="300" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">OPTA RJ45</text>
  <text x="300" y="324" text-anchor="middle" font-size="10" fill="#854d0e">192.168.250.10</text>
  <text x="300" y="344" text-anchor="middle" font-size="9" fill="#a16207">Modbus client</text>

  <!-- CNC endpoint -->
  <rect x="420" y="280" width="160" height="80" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="500" y="304" text-anchor="middle" font-size="12" font-weight="700" fill="#312e81">CNC controller</text>
  <text x="500" y="324" text-anchor="middle" font-size="10" fill="#3730a3">192.168.250.1 : 502</text>
  <text x="500" y="344" text-anchor="middle" font-size="9" fill="#3730a3">Modbus server</text>

  <line x1="380" y1="320" x2="420" y2="320" stroke="#4f46e5" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-indigo)"/>

  <!-- 6 register block -->
  <rect x="100" y="400" width="600" height="100" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <text x="400" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">6 contiguous holding registers (one transaction per minute)</text>
  <line x1="120" y1="432" x2="680" y2="432" stroke="#86efac"/>
  <g font-size="11" fill="#166534">
    <text x="400" y="456" text-anchor="middle">spindle load · feed override · alarm code</text>
    <text x="400" y="476" text-anchor="middle">cycle state · cycle count · operator ID</text>
    <text x="400" y="492" text-anchor="middle" font-style="italic">starting address set per fleet via reg_spindle_load env var</text>
  </g>

  <!-- Down arrow from OPTA to register block -->
  <line x1="300" y1="360" x2="300" y2="398" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="525" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Read-only — does not issue commands. Cellular path bypasses plant network entirely.</text>
</svg>
