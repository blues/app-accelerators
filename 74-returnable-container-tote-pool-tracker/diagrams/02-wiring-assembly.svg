<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Notecarrier CX connections — no external sensors required</text>

  <!-- Notecarrier CX center -->
  <rect x="295" y="90" width="210" height="270" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,105) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="160" text-anchor="middle" font-size="10" fill="#475569">Cygnet STM32 host</text>

  <!-- Port labels inside Notecarrier CX -->
  <g font-size="11" fill="#0f172a">
    <!-- Left-side ports -->
    <text x="310" y="198" text-anchor="start">M.2</text>
    <text x="310" y="238" text-anchor="start">LIPO</text>
    <!-- Right-side ports -->
    <text x="490" y="198" text-anchor="end">u.FL</text>
    <text x="490" y="238" text-anchor="end">Qwiic</text>
    <!-- Bottom -->
    <text x="400" y="348" text-anchor="middle">USB-C</text>
  </g>

  <!-- Port dots -->
  <circle cx="295" cy="194" r="5" fill="#3b82f6"/>
  <circle cx="295" cy="234" r="5" fill="#10b981"/>
  <circle cx="505" cy="194" r="5" fill="#ef4444"/>
  <circle cx="505" cy="234" r="5" fill="#9333ea"/>
  <circle cx="400" cy="360" r="5" fill="#64748b"/>

  <!-- Notecard MBGLW (left) -->
  <rect x="60" y="165" width="175" height="58" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(76,179) scale(0.55)" fill="#312e81"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="148" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#312e81">Notecard MBGLW</text>
  <text x="148" y="200" text-anchor="middle" font-size="10" fill="#3730a3">seats into M.2 slot</text>
  <text x="148" y="214" text-anchor="middle" font-size="9" fill="#3730a3" font-style="italic">PCB WiFi ant. on-board · WiFi u.FL (opt.)</text>

  <!-- LiPo battery (left, below) -->
  <rect x="60" y="205" width="175" height="58" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <g transform="translate(76,219) scale(0.55)" fill="#064e3b"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33C16.4 22 17 21.4 17 20.67V5.33C17 4.6 16.4 4 15.67 4z"/></g>
  <text x="148" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">LiPo 2 Ah</text>
  <text x="148" y="251" text-anchor="middle" font-size="10" fill="#065f46">JST PH → LIPO port</text>

  <!-- Antenna (right) -->
  <rect x="565" y="165" width="175" height="58" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(581,179) scale(0.55)" fill="#7f1d1d"><path d="M8.1 13.34l2.83-2.83L3.91 3.5 1.1 6.33c-1.56 1.56-1.56 4.09 0 5.66l6.99 6.99 2.83-2.83-2.82-2.81zm6.78 2.6l-5.66-5.66-2.83 2.83 5.66 5.66c1.56 1.56 4.09 1.56 5.66 0 1.56-1.56 1.56-4.09 0-5.66l-2.83 2.83zM20 5.5c0-1.1-.9-2-2-2-.55 0-1.05.22-1.41.59l-1.06 1.06 2.83 2.83 1.06-1.06c.36-.37.58-.87.58-1.42z"/></g>
  <text x="652" y="193" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Cellular antenna</text>
  <text x="652" y="211" text-anchor="middle" font-size="10" fill="#991b1b">u.FL pigtail (patch or SMA)</text>

  <!-- Mojo (right, below) — bench only -->
  <rect x="565" y="205" width="175" height="58" rx="8" fill="#fdf4ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(581,219) scale(0.55)" fill="#581c87"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="652" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">Blues Mojo</text>
  <text x="652" y="251" text-anchor="middle" font-size="10" fill="#6b21a8">Qwiic · bench only</text>

  <!-- Connection arrows -->
  <!-- Notecard M.2 -->
  <line x1="235" y1="194" x2="291" y2="194" stroke="#3b82f6" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-blue)"/>
  <!-- LiPo LIPO -->
  <line x1="235" y1="234" x2="291" y2="234" stroke="#10b981" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>
  <!-- Antenna u.FL -->
  <line x1="565" y1="194" x2="509" y2="194" stroke="#ef4444" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>
  <!-- Mojo Qwiic -->
  <line x1="565" y1="234" x2="509" y2="234" stroke="#9333ea" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-purple)"/>

  <!-- WiFi RF paths note (left column, below LiPo block) -->
  <rect x="60" y="275" width="175" height="65" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="148" y="291" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">WiFi AP scanning</text>
  <text x="148" y="305" text-anchor="middle" font-size="9" fill="#166534">Plastic/poly enclosure:</text>
  <text x="148" y="317" text-anchor="middle" font-size="9" fill="#166534">on-board PCB ant. — no ext. hardware</text>
  <text x="148" y="330" text-anchor="middle" font-size="9" fill="#b91c1c" font-style="italic">Metal: ant. element must exit enclosure</text>

  <!-- DIP switch note -->
  <rect x="322" y="270" width="156" height="42" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="286" text-anchor="middle" font-size="10" fill="#92400e" font-weight="600">DIP switch</text>
  <text x="400" y="303" text-anchor="middle" font-size="10" fill="#92400e">NC = Notecard USB</text>
  <text x="400" y="317" text-anchor="middle" font-size="10" fill="#92400e">HST = Cygnet USB</text>

  <!-- Power chain bottom -->
  <rect x="40" y="410" width="720" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(50,418) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="434" font-size="12" font-weight="700" fill="#713f12">Power / bench validation path</text>

  <rect x="60" y="445" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="125" y="467" text-anchor="middle" font-size="11" fill="#713f12">LiPo 2 Ah</text>

  <rect x="230" y="445" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="295" y="467" text-anchor="middle" font-size="11" fill="#713f12">Mojo (bench)</text>

  <rect x="400" y="445" width="200" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="500" y="467" text-anchor="middle" font-size="11" fill="#713f12">Notecarrier CX LIPO</text>

  <line x1="190" y1="462" x2="228" y2="462" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="360" y1="462" x2="398" y2="462" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>

  <text x="635" y="455" font-size="10" fill="#92400e" font-style="italic">Mojo inline on battery</text>
  <text x="635" y="470" font-size="10" fill="#92400e" font-style="italic">rail — commissioning only.</text>
  <text x="635" y="485" font-size="10" fill="#92400e" font-style="italic">Not deployed in field.</text>
</svg>
