<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Data Flow</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Wake · decide · emit</text>

  <!-- Wake sources (left) -->
  <rect x="20" y="120" width="165" height="190" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <g transform="translate(93,135) scale(0.75)" fill="#0c4a6e"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></g>
  <text x="103" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">Wake sources</text>
  <line x1="40" y1="186" x2="165" y2="186" stroke="#7dd3fc"/>
  <g font-size="11" fill="#0c4a6e">
    <text x="103" y="213" text-anchor="middle">Accelerometer</text>
    <text x="103" y="233" text-anchor="middle">motion-state change</text>
    <text x="103" y="263" text-anchor="middle">Heartbeat timer</text>
    <text x="103" y="283" text-anchor="middle">(heartbeat_hours)</text>
  </g>

  <!-- Cygnet logic (center-left) -->
  <rect x="225" y="120" width="165" height="190" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(298,135) scale(0.75)" fill="#7c2d12"><path d="M20 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9.6 13.6L7 13.2l1.4-1.4 2 2 4.6-4.6 1.4 1.4-6 6z"/></g>
  <text x="308" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Cygnet host</text>
  <text x="308" y="190" text-anchor="middle" font-size="11" fill="#9a3412">on each wake</text>
  <line x1="245" y1="204" x2="370" y2="204" stroke="#fed7aa"/>
  <g font-size="11" fill="#7c2d12">
    <text x="308" y="228" text-anchor="middle">Read motion state</text>
    <text x="308" y="248" text-anchor="middle">Read battery mV</text>
    <text x="308" y="268" text-anchor="middle">Fetch env vars</text>
    <text x="308" y="288" text-anchor="middle">Decide note type</text>
    <text x="308" y="308" text-anchor="middle">Queue + sleep</text>
  </g>

  <!-- tote_event.qo (top-right) -->
  <rect x="430" y="120" width="175" height="88" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(506,130) scale(0.65)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="518" y="163" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">tote_event.qo</text>
  <text x="518" y="181" text-anchor="middle" font-size="10" fill="#991b1b">sync:true · immediate</text>
  <text x="518" y="198" text-anchor="middle" font-size="10" fill="#991b1b">on motion-state change</text>

  <!-- tote_heartbeat.qo (bottom-right) -->
  <rect x="430" y="222" width="175" height="88" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(506,232) scale(0.65)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="518" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">tote_heartbeat.qo</text>
  <text x="518" y="283" text-anchor="middle" font-size="10" fill="#166534">templated · queued</text>
  <text x="518" y="300" text-anchor="middle" font-size="10" fill="#166534">per heartbeat_hours</text>

  <!-- Notehub (far right) -->
  <rect x="640" y="120" width="140" height="190" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(701,170) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="710" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <text x="710" y="236" text-anchor="middle" font-size="11" fill="#1e40af">Appends location</text>
  <text x="710" y="254" text-anchor="middle" font-size="11" fill="#1e40af">+ routes events</text>

  <!-- Arrows -->
  <!-- Wake → Cygnet -->
  <line x1="185" y1="215" x2="223" y2="215" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <!-- Cygnet → event -->
  <line x1="390" y1="175" x2="428" y2="165" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <!-- Cygnet → heartbeat -->
  <line x1="390" y1="255" x2="428" y2="265" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>
  <!-- event → Notehub -->
  <line x1="605" y1="160" x2="638" y2="185" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <!-- heartbeat → Notehub -->
  <line x1="605" y1="265" x2="638" y2="240" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Two Notefiles, two routes — motion events to WMS/fleet portal; heartbeats to pool-health analytics.</text>
</svg>
