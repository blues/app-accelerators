<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="380" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Returnable Container / Tote Pool Tracker</text>

  <!-- Notecard MBGLW (left) -->
  <rect x="20" y="120" width="170" height="200" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- WiFi/cell icon -->
  <g transform="translate(91,135) scale(0.75)" fill="#312e81"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="105" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Notecard MBGLW</text>
  <line x1="40" y1="186" x2="170" y2="186" stroke="#c7d2fe"/>
  <g font-size="11" fill="#3730a3">
    <text x="105" y="210" text-anchor="middle">Built-in accelerometer</text>
    <text x="105" y="232" text-anchor="middle">Motion detection</text>
    <text x="105" y="254" text-anchor="middle">Cell tower data</text>
    <text x="105" y="276" text-anchor="middle">LTE-M modem</text>
    <text x="105" y="298" text-anchor="middle">ATTN wake signal</text>
  </g>

  <!-- Notecarrier CX + Cygnet (center-left) -->
  <rect x="240" y="120" width="190" height="200" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(326,135) scale(0.75)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="335" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Notecarrier CX</text>
  <text x="335" y="190" text-anchor="middle" font-size="11" fill="#854d0e">Cygnet STM32 host</text>
  <line x1="260" y1="204" x2="410" y2="204" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="335" y="228" text-anchor="middle">Wake on ATTN / timer</text>
    <text x="335" y="250" text-anchor="middle">Read motion + battery</text>
    <text x="335" y="272" text-anchor="middle">Queue note via I²C</text>
    <text x="335" y="294" text-anchor="middle">Env var overrides</text>
    <text x="335" y="316" text-anchor="middle">ATTN-gated sleep</text>
  </g>

  <!-- Notehub (center-right) -->
  <rect x="480" y="120" width="170" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(556,135) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="565" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <line x1="500" y1="186" x2="630" y2="186" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="565" y="210" text-anchor="middle">Session termination</text>
    <text x="565" y="232" text-anchor="middle">Resolves location</text>
    <text x="565" y="254" text-anchor="middle">Event storage</text>
    <text x="565" y="276" text-anchor="middle">Env vars delivery</text>
    <text x="565" y="298" text-anchor="middle">Routing</text>
  </g>

  <!-- Routes (right) -->
  <rect x="700" y="120" width="85" height="200" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(733,135) scale(0.75)" fill="#581c87"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="742" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">Routes</text>
  <line x1="710" y1="186" x2="775" y2="186" stroke="#e9d5ff"/>
  <g font-size="10" fill="#6b21a8">
    <text x="742" y="210" text-anchor="middle">WMS</text>
    <text x="742" y="232" text-anchor="middle">Fleet portal</text>
    <text x="742" y="254" text-anchor="middle">Analytics</text>
    <text x="742" y="276" text-anchor="middle">Alerts</text>
  </g>

  <!-- Connection labels ABOVE arrows -->
  <text x="215" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">I²C · ATTN</text>
  <text x="455" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">LTE-M cellular</text>
  <text x="680" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">routes</text>

  <!-- Arrows -->
  <line x1="190" y1="220" x2="238" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="430" y1="220" x2="478" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="650" y1="220" x2="698" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Cellular-first deployment — no site networking, no external sensors, single SKU across the supply chain.</text>
</svg>
