<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="540" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">4 CT channels (A0–A3) · shared bias node · external SMA antenna</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="320" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="170" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet · MBGLW</text>

  <g font-size="11" fill="#0f172a">
    <text x="335" y="204">A0</text>
    <text x="335" y="324">A1</text>
    <text x="465" y="204" text-anchor="end">A2</text>
    <text x="465" y="324" text-anchor="end">A3</text>
    <text x="400" y="398" text-anchor="middle">+VBAT</text>
  </g>
  <g>
    <circle cx="320" cy="200" r="4" fill="#ef4444"/>
    <circle cx="320" cy="320" r="4" fill="#ef4444"/>
    <circle cx="480" cy="200" r="4" fill="#ef4444"/>
    <circle cx="480" cy="320" r="4" fill="#ef4444"/>
    <circle cx="400" cy="420" r="4" fill="#0ea5e9"/>
  </g>

  <!-- Top-left: CT ch1 -->
  <rect x="40" y="170" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(56,184) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="135" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">CT ch 1</text>
  <text x="135" y="218" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013-030 + bias</text>

  <!-- Bottom-left: CT ch2 -->
  <rect x="40" y="290" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(56,304) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="135" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">CT ch 2</text>
  <text x="135" y="338" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013-030 + bias</text>

  <!-- Top-right: CT ch3 -->
  <rect x="580" y="170" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(596,184) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">CT ch 3</text>
  <text x="675" y="218" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013-030 + bias</text>

  <!-- Bottom-right: CT ch4 -->
  <rect x="580" y="290" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(596,304) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="675" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">CT ch 4</text>
  <text x="675" y="338" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013-030 + bias</text>

  <!-- Translucent connection lines (straight horizontal to edge dots) -->
  <line x1="220" y1="200" x2="316" y2="200" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="220" y1="320" x2="316" y2="320" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="580" y1="200" x2="484" y2="200" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="580" y1="320" x2="484" y2="320" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Shared bias note (positioned in subtitle area, outside Notecarrier box) -->
  <text x="400" y="80" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">all 4 channels share one bias node — 10 kΩ / 10 kΩ + 10 µF</text>

  <!-- Power chain bottom -->
  <rect x="40" y="450" width="720" height="60" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(50,458) scale(0.65)" fill="#7c2d12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="478" font-size="12" font-weight="700" fill="#7c2d12">Power</text>
  <text x="200" y="478" font-size="11" fill="#9a3412">120 VAC →</text>
  <text x="320" y="478" font-size="11" fill="#9a3412">IRM-10-5 (5 V) →</text>
  <text x="500" y="478" font-size="11" fill="#9a3412">Mojo →</text>
  <text x="600" y="478" font-size="11" fill="#9a3412">Notecarrier +VBAT</text>

  <line x1="400" y1="450" x2="400" y2="425" stroke="#0ea5e9" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
</svg>
