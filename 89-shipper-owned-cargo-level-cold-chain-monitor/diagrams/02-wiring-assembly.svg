<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#eab308"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="540" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">PT100 + MAX31865 on SPI · SHT41 + VEML7700 on Qwiic · LiPo on JST</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="280" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="174" text-anchor="middle" font-size="10" fill="#475569">Cygnet · NBGLWX</text>

  <!-- Pin labels on Notecarrier CX -->
  <g font-size="11" fill="#0f172a">
    <text x="335" y="222">SPI · D10–D13</text>
    <text x="335" y="292">Qwiic</text>
    <text x="465" y="222" text-anchor="end">u.FL MAIN</text>
    <text x="465" y="292" text-anchor="end">LIPO</text>
    <text x="400" y="358" text-anchor="middle">+VBAT</text>
  </g>
  <circle cx="320" cy="218" r="4" fill="#f59e0b"/>
  <circle cx="320" cy="288" r="4" fill="#eab308"/>
  <circle cx="480" cy="218" r="4" fill="#3b82f6"/>
  <circle cx="480" cy="288" r="4" fill="#10b981"/>
  <circle cx="400" cy="380" r="4" fill="#0ea5e9"/>

  <!-- Left top: MAX31865 + PT100 -->
  <rect x="40" y="186" width="180" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <g transform="translate(56,200) scale(0.55)" fill="#7c2d12"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4z"/></g>
  <text x="135" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">MAX31865 + PT100</text>
  <text x="135" y="234" text-anchor="middle" font-size="10" fill="#9a3412">SPI · 4-wire · NIST cal</text>

  <!-- Left bottom: SHT41 + VEML7700 (Qwiic chain) -->
  <rect x="40" y="266" width="180" height="60" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
  <g transform="translate(56,280) scale(0.55)" fill="#713f12"><path d="M3 3h18v2H3zm0 8h18v2H3zm0 8h18v2H3z"/></g>
  <text x="135" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">SHT41 + VEML7700</text>
  <text x="135" y="314" text-anchor="middle" font-size="10" fill="#92400e">Qwiic chain · 0x44 · 0x10</text>

  <!-- Right top: Multi-band antenna -->
  <rect x="580" y="186" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <g transform="translate(596,200) scale(0.55)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="675" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Skylo antenna</text>
  <text x="675" y="234" text-anchor="middle" font-size="10" fill="#1e40af">cell / WiFi / NTN · MAIN</text>

  <!-- Right bottom: LiPo -->
  <rect x="580" y="266" width="180" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <g transform="translate(596,280) scale(0.55)" fill="#064e3b"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33C16.4 22 17 21.4 17 20.67V5.33C17 4.6 16.4 4 15.67 4z"/></g>
  <text x="675" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">LiPo 2000 mAh</text>
  <text x="675" y="314" text-anchor="middle" font-size="10" fill="#065f46">JST-PH · 3.7 V</text>

  <!-- Connection arrows -->
  <line x1="220" y1="218" x2="316" y2="218" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="220" y1="288" x2="316" y2="288" stroke="#eab308" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-yellow)"/>
  <line x1="580" y1="218" x2="484" y2="218" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>
  <line x1="580" y1="288" x2="484" y2="288" stroke="#10b981" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Power chain bottom -->
  <rect x="40" y="430" width="720" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(50,438) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="454" font-size="12" font-weight="700" fill="#713f12">Power path</text>
  <rect x="60" y="465" width="150" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="135" y="487" text-anchor="middle" font-size="11" fill="#713f12">LiPo 2000 mAh</text>
  <rect x="240" y="465" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="305" y="487" text-anchor="middle" font-size="11" fill="#713f12">Mojo (bench)</text>
  <rect x="400" y="465" width="200" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="500" y="487" text-anchor="middle" font-size="11" fill="#713f12">Notecarrier CX +VBAT</text>
  <line x1="210" y1="482" x2="238" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="370" y1="482" x2="398" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
</svg>
