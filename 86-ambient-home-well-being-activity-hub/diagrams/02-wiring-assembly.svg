<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="540" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">PIR · reed · SHT31 · piezo on Notecarrier CX · USB-C wall power</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="280" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="174" text-anchor="middle" font-size="10" fill="#475569">Cygnet · MBGLW</text>

  <!-- Pin labels -->
  <g font-size="11" fill="#0f172a">
    <text x="335" y="222">D6</text>
    <text x="335" y="292">D9</text>
    <text x="465" y="222" text-anchor="end">SDA · SCL</text>
    <text x="465" y="292" text-anchor="end">A0</text>
    <text x="400" y="358" text-anchor="middle">USB-C</text>
  </g>
  <circle cx="320" cy="218" r="4" fill="#f59e0b"/>
  <circle cx="320" cy="288" r="4" fill="#ef4444"/>
  <circle cx="480" cy="218" r="4" fill="#3b82f6"/>
  <circle cx="480" cy="288" r="4" fill="#9333ea"/>
  <circle cx="400" cy="380" r="4" fill="#0ea5e9"/>

  <!-- Left top: PIR -->
  <rect x="40" y="186" width="180" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <g transform="translate(56,200) scale(0.55)" fill="#7c2d12"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></g>
  <text x="135" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">PIR motion</text>
  <text x="135" y="234" text-anchor="middle" font-size="10" fill="#9a3412">Adafruit 4871 · OUT→D6</text>

  <!-- Left bottom: Reed switch -->
  <rect x="40" y="266" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(56,280) scale(0.55)" fill="#7f1d1d"><path d="M14 6v15H3v-2h2V3h9v1h5v15h2v2h-4V6h-3zm-4 7h2v-2h-2v2z"/></g>
  <text x="135" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Bathroom reed</text>
  <text x="135" y="314" text-anchor="middle" font-size="10" fill="#991b1b">Adafruit 375 · D9 + GND</text>

  <!-- Right top: SHT31 -->
  <rect x="580" y="186" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <g transform="translate(596,200) scale(0.55)" fill="#1e3a8a"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4z"/></g>
  <text x="675" y="214" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">SHT31 humidity</text>
  <text x="675" y="234" text-anchor="middle" font-size="10" fill="#1e40af">I²C · PCA9615 ext.</text>

  <!-- Right bottom: Piezo -->
  <rect x="580" y="266" width="180" height="60" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(596,280) scale(0.55)" fill="#581c87"><path d="M3 9h2v6H3zm4-4h2v14H7zm4-3h2v20h-2zm4 6h2v8h-2zm4 4h2v4h-2z"/></g>
  <text x="675" y="294" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">Bed piezo</text>
  <text x="675" y="314" text-anchor="middle" font-size="10" fill="#6b21a8">SEN-09197 · 1M/10k → A0</text>

  <line x1="220" y1="218" x2="316" y2="218" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="220" y1="288" x2="316" y2="288" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="580" y1="218" x2="484" y2="218" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>
  <line x1="580" y1="288" x2="484" y2="288" stroke="#9333ea" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-purple)"/>

  <!-- Power chain bottom -->
  <rect x="40" y="430" width="720" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(50,438) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="454" font-size="12" font-weight="700" fill="#713f12">Power path</text>
  <rect x="60" y="465" width="150" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="135" y="487" text-anchor="middle" font-size="11" fill="#713f12">USB-C 5 V wall</text>
  <rect x="240" y="465" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="305" y="487" text-anchor="middle" font-size="11" fill="#713f12">Mojo (bench)</text>
  <rect x="400" y="465" width="200" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="500" y="487" text-anchor="middle" font-size="11" fill="#713f12">Notecarrier CX +VBAT</text>
  <line x1="210" y1="482" x2="238" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="370" y1="482" x2="398" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
</svg>
