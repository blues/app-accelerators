<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Rail Car Condition &amp; Interchange Tracker</text>

  <!-- Sensors -->
  <rect x="20" y="110" width="160" height="210" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(91,124) scale(0.75)" fill="#7c2d12"><path d="M7.76 16.24C6.67 15.16 6 13.66 6 12s.67-3.16 1.76-4.24l1.42 1.42C8.45 9.9 8 10.9 8 12c0 1.1.45 2.1 1.17 2.83l-1.41 1.41zm8.48 0l-1.41-1.41C15.55 14.1 16 13.1 16 12c0-1.1-.45-2.1-1.17-2.83l1.41-1.41C17.33 8.84 18 10.34 18 12s-.67 3.16-1.76 4.24zM12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7 2c0-1.93.78-3.68 2.05-4.95l-1.42-1.42C4.01 7.26 3 9.51 3 12s1.01 4.74 2.64 6.36l1.42-1.42C5.78 15.68 5 13.93 5 12zm14.36 0c0 1.93-.78 3.68-2.05 4.95l1.41 1.41C21 16.74 22 14.49 22 12s-1.01-4.74-2.64-6.36l-1.41 1.41C19.22 8.32 20 10.07 20 12z"/></g>
  <text x="100" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Sensors</text>
  <line x1="40" y1="176" x2="160" y2="176" stroke="#fed7aa"/>
  <g font-size="11" fill="#9a3412">
    <text x="100" y="200" text-anchor="middle">Reed switch (coupler)</text>
    <text x="100" y="222" text-anchor="middle">ADXL345 ±16 G</text>
    <text x="100" y="244" text-anchor="middle">MPRLS 0–25 PSI</text>
    <text x="100" y="264" text-anchor="middle" font-style="italic">(TANK_CAR only)</text>
    <text x="100" y="286" text-anchor="middle">DS18B20 temp</text>
    <text x="100" y="306" text-anchor="middle" font-style="italic">(TANK_CAR only)</text>
  </g>

  <!-- Edge enclosure -->
  <rect x="230" y="110" width="200" height="210" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(321,124) scale(0.75)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="330" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Edge enclosure</text>
  <line x1="250" y1="176" x2="410" y2="176" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="330" y="202" text-anchor="middle">Notecarrier CX</text>
    <text x="330" y="224" text-anchor="middle">Cygnet STM32L433</text>
    <text x="330" y="246" text-anchor="middle">Notecard for Skylo</text>
    <text x="330" y="268" text-anchor="middle">NOTE-NBGLWX</text>
  </g>
  <text x="330" y="300" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">sample · score · queue</text>

  <!-- Notehub -->
  <rect x="480" y="110" width="170" height="210" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(556,124) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="565" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <line x1="500" y1="176" x2="630" y2="176" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="565" y="202" text-anchor="middle">Storage</text>
    <text x="565" y="224" text-anchor="middle">Routing</text>
    <text x="565" y="246" text-anchor="middle">Env vars</text>
    <text x="565" y="268" text-anchor="middle">Smart Fleets</text>
  </g>

  <!-- Routes -->
  <rect x="700" y="110" width="90" height="210" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(731,124) scale(0.75)" fill="#581c87"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="745" y="162" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Routes</text>
  <line x1="710" y1="176" x2="780" y2="176" stroke="#e9d5ff"/>
  <g font-size="11" fill="#6b21a8">
    <text x="745" y="202" text-anchor="middle">Alerts</text>
    <text x="745" y="224" text-anchor="middle">Analytics</text>
    <text x="745" y="246" text-anchor="middle">Geofencing</text>
  </g>

  <!-- Connection labels above arrows -->
  <text x="205" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">local I/O · I²C + 1-Wire</text>
  <text x="455" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">LTE-M / NB-IoT + Skylo NTN</text>
  <text x="685" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">routes</text>

  <!-- Arrows -->
  <line x1="180" y1="216" x2="228" y2="216" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="430" y1="216" x2="478" y2="216" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="650" y1="216" x2="698" y2="216" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Notecard autonomously manages LTE-M/NB-IoT ↔ Skylo NTN satellite fallback — no host involvement in transport selection.</text>
</svg>
