<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" width="860" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="ar-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="860" height="580" fill="#ffffff"/>

  <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="430" y="52" text-anchor="middle" font-size="12" fill="#64748b">Sensor pinout and corrected inline Scoop power path</text>

  <!-- Notecarrier CX center -->
  <rect x="310" y="90" width="200" height="280" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(401,104) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="410" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="410" y="158" text-anchor="middle" font-size="10" fill="#475569">Cygnet · Notecard for Skylo</text>

  <!-- CX port labels -->
  <g font-size="11" fill="#0f172a">
    <text x="325" y="195">SDA/SCL</text>
    <text x="325" y="230">D5</text>
    <text x="325" y="265">D6 †</text>
    <text x="495" y="195" text-anchor="end">SDA/SCL †</text>
    <text x="495" y="230" text-anchor="end">GPS u.FL</text>
    <text x="495" y="265" text-anchor="end">LTE u.FL</text>
    <text x="410" y="355" text-anchor="middle">+VBAT</text>
  </g>
  <g>
    <circle cx="310" cy="191" r="4" fill="#f59e0b"/>
    <circle cx="310" cy="226" r="4" fill="#10b981"/>
    <circle cx="310" cy="261" r="4" fill="#8b5cf6"/>
    <circle cx="510" cy="191" r="4" fill="#f97316"/>
    <circle cx="510" cy="226" r="4" fill="#3b82f6"/>
    <circle cx="510" cy="261" r="4" fill="#3b82f6"/>
    <circle cx="410" cy="370" r="4" fill="#0ea5e9"/>
  </g>
  <text x="410" y="390" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">† TANK_CAR builds only</text>

  <!-- Left: ADXL345 -->
  <rect x="30" y="160" width="170" height="65" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">ADXL345</text>
  <text x="115" y="207" text-anchor="middle" font-size="10" fill="#9a3412">±16 G · I²C · SDO→GND</text>
  <text x="115" y="221" text-anchor="middle" font-size="10" fill="#9a3412">addr 0x53 · 3.3 V</text>

  <!-- Left: Reed switch -->
  <rect x="30" y="250" width="170" height="55" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="115" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Reed switch</text>
  <text x="115" y="293" text-anchor="middle" font-size="10" fill="#065f46">N.O. contacts · D5 + GND</text>

  <!-- Left: MPRLS (TANK_CAR) -->
  <rect x="30" y="335" width="170" height="55" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="115" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">MPRLS †</text>
  <text x="115" y="374" text-anchor="middle" font-size="10" fill="#6d28d9">0–25 PSI abs · I²C · 0x18</text>
  <text x="115" y="388" text-anchor="middle" font-size="10" fill="#6d28d9">3.3 V · SDA/SCL header</text>

  <!-- Right: Antennas -->
  <rect x="630" y="160" width="200" height="140" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="730" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Antennas</text>
  <line x1="645" y1="198" x2="815" y2="198" stroke="#cbd5e1"/>
  <text x="730" y="220" text-anchor="middle" font-size="11" fill="#334155">LTE/NTN (Skylo-certified)</text>
  <text x="730" y="238" text-anchor="middle" font-size="10" fill="#475569">included with NOTE-NBGLWX</text>
  <text x="730" y="262" text-anchor="middle" font-size="11" fill="#334155">GNSS (multi-band L1/L2/L5)</text>
  <text x="730" y="280" text-anchor="middle" font-size="10" fill="#475569">SMA · via u.FL pigtail</text>

  <!-- Right: DS18B20 (TANK_CAR) -->
  <rect x="630" y="330" width="200" height="65" rx="8" fill="#faf5ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="730" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">DS18B20 †</text>
  <text x="730" y="372" text-anchor="middle" font-size="10" fill="#6d28d9">1-Wire · D6 · 4.7 kΩ pull-up</text>
  <text x="730" y="386" text-anchor="middle" font-size="10" fill="#6d28d9">D6→3V3_OUT · 3.3 V · GND</text>

  <!-- Connection arrows: sensors to CX -->
  <line x1="200" y1="191" x2="308" y2="191" stroke="#f59e0b" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="200" y1="276" x2="308" y2="226" stroke="#10b981" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="200" y1="362" x2="308" y2="261" stroke="#8b5cf6" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-purple)"/>
  <line x1="630" y1="230" x2="512" y2="226" stroke="#3b82f6" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-blue)"/>
  <line x1="630" y1="265" x2="512" y2="261" stroke="#3b82f6" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-blue)"/>
  <line x1="630" y1="362" x2="512" y2="261" stroke="#8b5cf6" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-purple)"/>

  <!-- ===== POWER CHAIN (bottom) — corrected inline Scoop topology ===== -->
  <rect x="20" y="448" width="820" height="112" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="35" y="468" font-size="12" font-weight="700" fill="#713f12">Power path (inline Scoop topology)</text>

  <!-- Solar -->
  <rect x="32" y="478" width="100" height="72" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="82" y="500" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Solar panel</text>
  <text x="82" y="517" text-anchor="middle" font-size="10" fill="#92400e">6 V · 3–5 W</text>
  <text x="82" y="534" text-anchor="middle" font-size="10" fill="#92400e">→ chrg ctrl</text>

  <!-- Charge controller + LiPo -->
  <rect x="154" y="478" width="120" height="72" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="214" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Charge ctrl</text>
  <text x="214" y="513" text-anchor="middle" font-size="10" fill="#92400e">MPPT · CC/CV</text>
  <text x="214" y="529" text-anchor="middle" font-size="10" fill="#92400e">+ LiPo JST</text>
  <text x="214" y="543" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">primary storage</text>

  <!-- 5V boost -->
  <rect x="296" y="478" width="110" height="72" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="351" y="497" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">5 V boost</text>
  <text x="351" y="513" text-anchor="middle" font-size="10" fill="#92400e">LiPo → 5 V</text>
  <text x="351" y="529" text-anchor="middle" font-size="10" fill="#92400e">regulated out</text>
  <text x="351" y="543" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">≥500 mA</text>

  <!-- Scoop -->
  <rect x="428" y="474" width="200" height="80" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="528" y="493" text-anchor="middle" font-size="12" font-weight="700" fill="#0c4a6e">Blues Scoop (LiC 250 F)</text>
  <line x1="438" y1="506" x2="618" y2="506" stroke="#bae6fd"/>
  <!-- J1/J3 label (left of Scoop) -->
  <text x="436" y="524" font-size="10" fill="#075985" font-weight="600">J1 (CHG)</text>
  <text x="436" y="538" font-size="10" fill="#075985">4.8–24 V in</text>
  <text x="436" y="549" font-size="9" fill="#0369a1" font-style="italic">J3 = header alt</text>
  <!-- J2/J4 label (right of Scoop) -->
  <text x="620" y="524" font-size="10" fill="#075985" font-weight="600" text-anchor="end">J2 (OUT)</text>
  <text x="620" y="538" font-size="10" fill="#075985" text-anchor="end">2.5–3.8 V</text>
  <text x="620" y="549" font-size="9" fill="#0369a1" font-style="italic" text-anchor="end">J4 = header alt</text>

  <!-- Notecarrier +VBAT -->
  <rect x="650" y="478" width="178" height="72" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="739" y="500" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Notecarrier CX</text>
  <text x="739" y="516" text-anchor="middle" font-size="10" fill="#92400e">+VBAT JST</text>
  <text x="739" y="532" text-anchor="middle" font-size="10" fill="#92400e">2.5–3.8 V from Scoop</text>
  <text x="739" y="548" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">J2/J4 → here</text>

  <!-- Power chain arrows -->
  <line x1="132" y1="514" x2="152" y2="514" stroke="#a16207" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="274" y1="514" x2="294" y2="514" stroke="#a16207" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="406" y1="514" x2="426" y2="514" stroke="#a16207" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="628" y1="514" x2="648" y2="514" stroke="#a16207" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-brown)"/>

  <!-- CX down to +VBAT power chain -->
  <line x1="410" y1="370" x2="410" y2="444" stroke="#0ea5e9" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="410" y1="444" x2="739" y2="444" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="739" y1="444" x2="739" y2="476" stroke="#0ea5e9" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>
</svg>
