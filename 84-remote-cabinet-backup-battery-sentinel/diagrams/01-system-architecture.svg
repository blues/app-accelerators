<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="380" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Remote Cabinet Backup Battery Sentinel</text>

  <!-- Battery sensors (orange) -->
  <rect x="20" y="120" width="170" height="180" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <!-- battery icon -->
  <g transform="translate(96,135) scale(0.75)" fill="#7c2d12">
    <path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zm-2.67 9h-2v2H9v-2H7v-2h2V9h2v2h2v2z"/>
  </g>
  <text x="105" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Battery sensors</text>
  <line x1="40" y1="186" x2="170" y2="186" stroke="#fed7aa"/>
  <g font-size="11" fill="#9a3412">
    <text x="105" y="212" text-anchor="middle">Pack voltage (V)</text>
    <text x="105" y="234" text-anchor="middle">Float current (mA)</text>
    <text x="105" y="256" text-anchor="middle">Surface temp (°C)</text>
    <text x="105" y="278" text-anchor="middle">INA228 · NTC</text>
  </g>

  <!-- Edge enclosure (yellow) -->
  <rect x="240" y="120" width="200" height="180" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(331,135) scale(0.75)" fill="#713f12">
    <path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/>
  </g>
  <text x="340" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Edge enclosure</text>
  <line x1="260" y1="186" x2="420" y2="186" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="340" y="212" text-anchor="middle">Notecarrier CX</text>
    <text x="340" y="234" text-anchor="middle">Cygnet STM32</text>
    <text x="340" y="256" text-anchor="middle">Notecard MBGLW</text>
    <text x="340" y="278" text-anchor="middle">DC-DC · LiPo</text>
  </g>
  <text x="340" y="296" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">samples + rules</text>

  <!-- Notehub (blue) -->
  <rect x="490" y="120" width="170" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(566,135) scale(0.75)" fill="#1e3a8a">
    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/>
  </g>
  <text x="575" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <line x1="510" y1="186" x2="640" y2="186" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="575" y="212" text-anchor="middle">Storage</text>
    <text x="575" y="234" text-anchor="middle">Routing</text>
    <text x="575" y="256" text-anchor="middle">Env vars</text>
  </g>

  <!-- Routes (purple) -->
  <rect x="710" y="120" width="80" height="180" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(741,135) scale(0.75)" fill="#581c87">
    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
  </g>
  <text x="750" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Routes</text>
  <line x1="720" y1="186" x2="780" y2="186" stroke="#e9d5ff"/>
  <g font-size="11" fill="#6b21a8">
    <text x="750" y="212" text-anchor="middle">On-call</text>
    <text x="750" y="234" text-anchor="middle">CMMS</text>
    <text x="750" y="256" text-anchor="middle">Analytics</text>
  </g>

  <!-- Connection labels above arrows -->
  <text x="215" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">local I/O</text>
  <text x="465" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">cellular / WiFi</text>
  <text x="685" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">routes</text>

  <!-- Arrows -->
  <line x1="190" y1="210" x2="238" y2="210" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="440" y1="210" x2="488" y2="210" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="660" y1="210" x2="708" y2="210" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Independent cellular uplink — reports through outages the site battery is meant to survive.</text>
</svg>
