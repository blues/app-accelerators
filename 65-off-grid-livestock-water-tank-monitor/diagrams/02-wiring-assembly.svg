<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="580" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">3 analog sensors · external Skylo antenna · solar-powered 12 V chain</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="280" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="170" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet · NOTE-NBGLWX</text>

  <g font-size="11" fill="#0f172a">
    <text x="335" y="204">A0</text>
    <text x="335" y="284">A1</text>
    <text x="465" y="204" text-anchor="end">A2 / A3</text>
    <text x="465" y="284" text-anchor="end">u.FL</text>
    <text x="400" y="358" text-anchor="middle">+VBAT</text>
  </g>
  <g>
    <circle cx="320" cy="200" r="4" fill="#f59e0b"/>
    <circle cx="320" cy="280" r="4" fill="#dc2626"/>
    <circle cx="480" cy="200" r="4" fill="#16a34a"/>
    <circle cx="480" cy="280" r="4" fill="#3b82f6"/>
    <circle cx="400" cy="380" r="4" fill="#0ea5e9"/>
  </g>

  <!-- Top-left: Ultrasonic level -->
  <rect x="40" y="170" width="180" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <g transform="translate(56,184) scale(0.55)" fill="#7c2d12"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44z"/></g>
  <text x="135" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">MaxBotix MB7389</text>
  <text x="135" y="218" text-anchor="middle" font-size="10" fill="#9a3412">ultrasonic · analog → A0</text>

  <!-- Bottom-left: CT pump current -->
  <rect x="40" y="250" width="180" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(56,264) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="135" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Pump CT</text>
  <text x="135" y="298" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013 + V/2 bias</text>

  <!-- Top-right: Battery divider -->
  <rect x="580" y="170" width="180" height="60" rx="8" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(596,184) scale(0.55)" fill="#064e3b"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Battery V divider</text>
  <text x="675" y="218" text-anchor="middle" font-size="10" fill="#065f46">PMOS gated by A3</text>

  <!-- Bottom-right: External Skylo antenna -->
  <rect x="580" y="250" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <g transform="translate(596,264) scale(0.55)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="675" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Skylo MAIN antenna</text>
  <text x="675" y="298" text-anchor="middle" font-size="10" fill="#1e40af">u.FL → SMA bulkhead</text>

  <!-- Translucent connection lines -->
  <line x1="220" y1="200" x2="316" y2="200" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="220" y1="280" x2="316" y2="280" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="580" y1="200" x2="484" y2="200" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="580" y1="280" x2="484" y2="280" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>

  <!-- Power chain bottom — solar to +VBAT -->
  <rect x="20" y="430" width="760" height="100" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(30,438) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="58" y="454" font-size="12" font-weight="700" fill="#713f12">Solar power chain</text>

  <rect x="40" y="475" width="100" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="90" y="497" text-anchor="middle" font-size="11" fill="#713f12">Solar 20 W</text>

  <rect x="170" y="475" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="235" y="497" text-anchor="middle" font-size="11" fill="#713f12">Charge ctrl</text>

  <rect x="330" y="475" width="100" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="380" y="497" text-anchor="middle" font-size="11" fill="#713f12">12 V battery</text>

  <rect x="460" y="475" width="130" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="525" y="497" text-anchor="middle" font-size="11" fill="#713f12">5 V step-down</text>

  <rect x="620" y="475" width="140" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="690" y="497" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">+VBAT</text>

  <line x1="140" y1="492" x2="168" y2="492" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="300" y1="492" x2="328" y2="492" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="430" y1="492" x2="458" y2="492" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="590" y1="492" x2="618" y2="492" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>

  <!-- Safety footer -->
  <rect x="20" y="545" width="760" height="22" rx="4" fill="#fef2f2" stroke="#dc2626"/>
  <text x="400" y="560" text-anchor="middle" font-size="10" fill="#7f1d1d">⚠ Lockout/tagout the pump circuit before installing the CT — qualified personnel only.</text>
</svg>
