<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="560" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Single ultrasonic sensor on D5 · LiPo battery power · internal flex antenna</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="180" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="170" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet · MBGLW</text>

  <g font-size="11" fill="#0f172a">
    <text x="335" y="224">D5</text>
    <text x="400" y="258" text-anchor="middle">+VBAT</text>
  </g>
  <g>
    <circle cx="320" cy="220" r="4" fill="#3b82f6"/>
    <circle cx="400" cy="280" r="4" fill="#0ea5e9"/>
  </g>

  <!-- Left: MB7389 sensor -->
  <rect x="40" y="190" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <g transform="translate(56,204) scale(0.55)" fill="#1e3a8a"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44zm-9.79 6.84a2 2 0 0 0 2.83 0l5.66-8.49-8.49 5.66a2 2 0 0 0 0 2.83z"/></g>
  <text x="135" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">MaxBotix MB7389</text>
  <text x="135" y="238" text-anchor="middle" font-size="10" fill="#1e40af">ultrasonic · IP67 · PWM</text>

  <!-- Right: Antenna note -->
  <rect x="580" y="190" width="180" height="60" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <g transform="translate(596,204) scale(0.55)" fill="#0f172a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="675" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Taoglas FW.10.0113</text>
  <text x="675" y="238" text-anchor="middle" font-size="10" fill="#334155">u.FL → MAIN · internal</text>

  <!-- Connection from sensor to D5 -->
  <line x1="220" y1="220" x2="316" y2="220" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>

  <!-- ATTN-EN callout (left, below sensor) -->
  <rect x="40" y="320" width="180" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">⚠ ATTN ↔ EN jumper</text>
  <text x="130" y="365" text-anchor="middle" font-size="10" fill="#991b1b">required for sleep gating</text>

  <!-- Mojo bench note (right, below antenna) -->
  <rect x="580" y="320" width="180" height="60" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="670" y="345" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">Mojo (bench only)</text>
  <text x="670" y="365" text-anchor="middle" font-size="10" fill="#6b21a8">inline LiPo → +VBAT</text>

  <!-- Power chain bottom -->
  <rect x="40" y="420" width="720" height="90" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(50,428) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="444" font-size="12" font-weight="700" fill="#713f12">Power path</text>

  <rect x="80" y="465" width="160" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="160" y="487" text-anchor="middle" font-size="11" fill="#713f12">LiPo 3.7 V (2 Ah)</text>

  <rect x="300" y="465" width="140" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="370" y="487" text-anchor="middle" font-size="11" fill="#713f12">Mojo</text>

  <rect x="500" y="465" width="220" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="610" y="487" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">Notecarrier +VBAT</text>

  <line x1="240" y1="482" x2="298" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="440" y1="482" x2="498" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>

  <!-- Safety footer -->
  <rect x="40" y="525" width="720" height="22" rx="4" fill="#fef2f2" stroke="#dc2626"/>
  <text x="400" y="540" text-anchor="middle" font-size="10" fill="#7f1d1d">⚠ Field installs near holding tanks must use a hazardous-location-rated sensor — MB7389 is bench/POC only.</text>
</svg>
