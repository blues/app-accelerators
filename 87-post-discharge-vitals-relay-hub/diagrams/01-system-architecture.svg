<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="390" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Post-Discharge Vitals Relay Hub</text>

  <!-- BLE Patient Devices -->
  <rect x="15" y="100" width="160" height="210" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(83,113) scale(0.75)" fill="#581c87"><path d="M17.71 7.18C16.25 5.71 14.22 5 12 5s-4.25.71-5.71 2.18C4.84 8.63 4 10.48 4 12.5s.84 3.87 2.29 5.32L8 16.11C6.93 15.05 6.25 13.6 6.25 12c0-1.56.6-2.98 1.58-4.04l.01-.01A5.744 5.744 0 0 1 12 6.25c1.57 0 3 .64 4.04 1.67l.01.01c.99 1.06 1.6 2.48 1.6 4.04 0 1.6-.68 3.05-1.75 4.11l1.71 1.71C18.84 16.23 19.75 14.47 19.75 12.5c0-2.02-.84-3.87-2.29-5.32z"/><circle cx="12" cy="12.5" r="2.5"/></g>
  <text x="95" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">BLE Devices</text>
  <line x1="30" y1="167" x2="160" y2="167" stroke="#e9d5ff"/>
  <g font-size="11" fill="#6b21a8">
    <text x="95" y="190" text-anchor="middle">Weight Scale</text>
    <text x="95" y="210" text-anchor="middle">Blood Pressure Cuff</text>
    <text x="95" y="230" text-anchor="middle">Pulse Oximeter</text>
    <text x="95" y="250" text-anchor="middle">Activity Band</text>
  </g>
  <text x="95" y="296" text-anchor="middle" font-size="10" fill="#7c3aed" font-style="italic">BLE SIG profiles</text>

  <!-- Edge Hub -->
  <rect x="220" y="100" width="185" height="210" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(298,113) scale(0.75)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="313" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Edge Hub</text>
  <line x1="235" y1="167" x2="390" y2="167" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="313" y="190" text-anchor="middle">Feather nRF52840</text>
    <text x="313" y="210" text-anchor="middle">BLE Central · SoftDevice</text>
    <text x="313" y="234" text-anchor="middle">Notecarrier F</text>
    <text x="313" y="254" text-anchor="middle">Notecard MBGLW</text>
  </g>
  <text x="313" y="296" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">parse · queue · sync</text>

  <!-- Notehub -->
  <rect x="455" y="100" width="165" height="210" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(528,113) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="538" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <line x1="470" y1="167" x2="605" y2="167" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="538" y="190" text-anchor="middle">Event storage</text>
    <text x="538" y="210" text-anchor="middle">Routing</text>
    <text x="538" y="230" text-anchor="middle">Env vars</text>
    <text x="538" y="250" text-anchor="middle">Fleet mgmt</text>
  </g>
  <text x="538" y="296" text-anchor="middle" font-size="10" fill="#1d4ed8" font-style="italic">notehub.io</text>

  <!-- Routes: Alerts (top) -->
  <rect x="665" y="100" width="120" height="96" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(715,110) scale(0.65)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="725" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Alerts</text>
  <line x1="675" y1="157" x2="775" y2="157" stroke="#fecaca"/>
  <text x="725" y="177" text-anchor="middle" font-size="10" fill="#991b1b">vitals_alert.qo</text>
  <text x="725" y="191" text-anchor="middle" font-size="10" fill="#991b1b">care coordinator</text>

  <!-- Routes: Readings (bottom) -->
  <rect x="665" y="214" width="120" height="96" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(715,224) scale(0.65)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="725" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Readings</text>
  <line x1="675" y1="271" x2="775" y2="271" stroke="#bbf7d0"/>
  <text x="725" y="291" text-anchor="middle" font-size="10" fill="#166534">4 reading Notefiles</text>
  <text x="725" y="305" text-anchor="middle" font-size="10" fill="#166534">analytics / EHR</text>

  <!-- Connection labels above arrows -->
  <text x="188" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">BLE 5.0</text>
  <text x="418" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">cellular (LTE-M)</text>
  <text x="635" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">routes</text>

  <!-- Arrows -->
  <line x1="175" y1="205" x2="218" y2="205" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="405" y1="205" x2="453" y2="205" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="620" y1="175" x2="663" y2="152" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="620" y1="235" x2="663" y2="258" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="360" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Cellular-first — no patient WiFi needed; plug in and operational from first power-on.</text>
</svg>
