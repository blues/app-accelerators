<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">VFD Pump Monitor — Modbus RTU off the plant LAN</text>

  <!-- VFD -->
  <rect x="30" y="140" width="160" height="200" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(101,155) scale(0.75)" fill="#312e81"><path d="M14.51 5.66l-2.36 2.36-2.83-2.83 2.36-2.36 2.83 2.83zm5.4 6.74L9.18 1.66c-.39-.39-1.02-.39-1.41 0L1.66 7.77c-.39.39-.39 1.02 0 1.41L12.4 19.91c.39.39 1.02.39 1.41 0l6.11-6.11c.39-.38.39-1.02-.01-1.4zM13.1 17.79L3.79 8.48l5.66-5.66 9.31 9.31-5.66 5.66zM18 14l3 3-3 3v-2h-3v-2h3v-2z"/></g>
  <text x="110" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">VFD</text>
  <text x="110" y="212" text-anchor="middle" font-size="11" fill="#3730a3">Modbus server</text>
  <line x1="50" y1="226" x2="170" y2="226" stroke="#c7d2fe"/>
  <g font-size="11" fill="#3730a3">
    <text x="110" y="252" text-anchor="middle">freq · current</text>
    <text x="110" y="274" text-anchor="middle">torque · temp</text>
    <text x="110" y="296" text-anchor="middle">runtime · fault</text>
  </g>

  <!-- OPTA -->
  <rect x="270" y="140" width="160" height="200" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(341,155) scale(0.75)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="350" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Arduino OPTA</text>
  <text x="350" y="212" text-anchor="middle" font-size="11" fill="#854d0e">Modbus client</text>
  <line x1="290" y1="226" x2="410" y2="226" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="350" y="252" text-anchor="middle">RS-485 read</text>
    <text x="350" y="274" text-anchor="middle">Edge logic</text>
    <text x="350" y="296" text-anchor="middle">Hourly stats</text>
  </g>

  <!-- Wireless for OPTA -->
  <rect x="510" y="140" width="160" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(581,155) scale(0.75)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="590" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Wireless for OPTA</text>
  <text x="590" y="212" text-anchor="middle" font-size="11" fill="#1e40af">Notecard MBNAW</text>
  <line x1="530" y1="226" x2="650" y2="226" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="590" y="252" text-anchor="middle">Cellular session</text>
    <text x="590" y="274" text-anchor="middle">Note queue</text>
    <text x="590" y="296" text-anchor="middle">Env vars</text>
  </g>

  <!-- Notehub -->
  <rect x="710" y="200" width="80" height="80" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(741,210) scale(0.75)" fill="#581c87"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="750" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">Notehub</text>
  <text x="750" y="266" text-anchor="middle" font-size="10" fill="#6b21a8">+ routes</text>

  <!-- Connection labels ABOVE arrows -->
  <text x="230" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">RS-485 · Modbus RTU</text>
  <text x="470" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">I²C · via AUX</text>
  <text x="690" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">LTE</text>

  <!-- Arrows -->
  <line x1="190" y1="240" x2="268" y2="240" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="430" y1="240" x2="508" y2="240" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="670" y1="240" x2="708" y2="240" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <text x="400" y="385" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">No PC, no gateway, no plant LAN — read-only Modbus, single SKU across plants.</text>
</svg>
