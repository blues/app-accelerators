<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">DIN-rail layout · RS-485 daisy · 24 VDC panel power</text>

  <!-- 24V supply -->
  <rect x="30" y="110" width="160" height="100" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(101,122) scale(0.65)" fill="#7c2d12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="110" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">HDR-15-24</text>
  <text x="110" y="178" text-anchor="middle" font-size="11" fill="#9a3412">120 VAC → 24 VDC</text>
  <text x="110" y="198" text-anchor="middle" font-size="10" fill="#c2410c" font-style="italic">often already in panel</text>

  <!-- OPTA -->
  <rect x="240" y="110" width="180" height="160" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(321,122) scale(0.65)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="330" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Arduino OPTA</text>
  <text x="330" y="175" text-anchor="middle" font-size="11" fill="#854d0e">RS-485 variant</text>
  <line x1="260" y1="190" x2="400" y2="190" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="330" y="218" text-anchor="middle">+24V · GND</text>
    <text x="330" y="242" text-anchor="middle">A · B · COM</text>
  </g>

  <!-- Wireless for OPTA -->
  <rect x="470" y="110" width="180" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(551,122) scale(0.65)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="560" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Wireless for OPTA</text>
  <text x="560" y="175" text-anchor="middle" font-size="11" fill="#1e40af">expansion + Notecard</text>
  <line x1="490" y1="190" x2="630" y2="190" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="560" y="218" text-anchor="middle">SMA × 2 antennas</text>
    <text x="560" y="242" text-anchor="middle">+24V shared</text>
  </g>

  <!-- Antennas -->
  <rect x="700" y="110" width="80" height="160" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <g transform="translate(731,122) scale(0.65)" fill="#0f172a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="740" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Antennas</text>
  <line x1="710" y1="170" x2="770" y2="170" stroke="#cbd5e1"/>
  <text x="740" y="200" text-anchor="middle" font-size="11" fill="#334155">primary</text>
  <text x="740" y="225" text-anchor="middle" font-size="11" fill="#334155">diversity</text>
  <text x="740" y="252" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">via cable glands</text>

  <!-- VFD -->
  <rect x="240" y="310" width="320" height="100" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(330,322) scale(0.65)" fill="#312e81"><path d="M14.51 5.66l-2.36 2.36-2.83-2.83 2.36-2.36 2.83 2.83zm5.4 6.74L9.18 1.66c-.39-.39-1.02-.39-1.41 0L1.66 7.77c-.39.39-.39 1.02 0 1.41L12.4 19.91c.39.39 1.02.39 1.41 0l6.11-6.11c.39-.38.39-1.02-.01-1.4zM13.1 17.79L3.79 8.48l5.66-5.66 9.31 9.31-5.66 5.66zM18 14l3 3-3 3v-2h-3v-2h3v-2z"/></g>
  <text x="400" y="355" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">VFD (Modbus server)</text>
  <text x="400" y="378" text-anchor="middle" font-size="11" fill="#3730a3">A · B · AGND/SC/Common</text>
  <text x="400" y="398" text-anchor="middle" font-size="10" fill="#4338ca" font-style="italic">120 Ω terminator at this end</text>

  <!-- 120Ω terminator note for OPTA end -->
  <text x="180" y="245" text-anchor="middle" font-size="10" fill="#a16207">120 Ω at OPTA end</text>

  <!-- Power arrow -->
  <line x1="190" y1="160" x2="238" y2="160" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <text x="214" y="151" text-anchor="middle" font-size="9" fill="#a16207">+24 V</text>

  <!-- I²C arrow -->
  <line x1="420" y1="190" x2="468" y2="190" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <text x="444" y="183" text-anchor="middle" font-size="9" fill="#475569">I²C</text>

  <!-- Antenna arrow -->
  <line x1="650" y1="190" x2="698" y2="190" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <!-- RS-485 daisy -->
  <line x1="330" y1="270" x2="330" y2="310" stroke="#dc2626" stroke-opacity="0.55" stroke-width="2" marker-end="url(#ar-red)"/>
  <text x="345" y="295" font-size="11" font-weight="600" fill="#7f1d1d">RS-485</text>

  <!-- Footer -->
  <text x="400" y="438" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Read-only over Modbus — does not command pump start/stop or speed.</text>
</svg>
