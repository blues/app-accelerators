<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Sensor and power connections on the Notecarrier CX</text>

  <!-- Notecarrier CX center -->
  <rect x="310" y="90" width="180" height="290" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,105) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="166" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet · MBGLW</text>

  <!-- Pin labels on CX left edge -->
  <g font-size="11" fill="#0f172a">
    <text x="325" y="212">+3V3_OUT</text>
    <text x="325" y="252">GND</text>
    <text x="325" y="292">RX</text>
    <text x="400" y="375" text-anchor="middle">+VBAT</text>
  </g>
  <!-- Pin dots on CX -->
  <circle cx="310" cy="208" r="4" fill="#ef4444"/>
  <circle cx="310" cy="248" r="4" fill="#1e293b"/>
  <circle cx="310" cy="288" r="4" fill="#3b82f6"/>
  <circle cx="400" cy="380" r="4" fill="#a16207"/>
  <!-- Right side: u.FL -->
  <text x="475" y="168" text-anchor="start" font-size="11" fill="#0f172a">u.FL</text>
  <circle cx="490" cy="164" r="4" fill="#475569"/>

  <!-- Left: A02YYUW sensor -->
  <rect x="20" y="140" width="190" height="170" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(36,155) scale(0.55)" fill="#7c2d12"><path d="M7.76 16.24C6.67 15.16 6 13.66 6 12s.67-3.16 1.76-4.24l1.42 1.42C8.45 9.9 8 10.9 8 12c0 1.1.45 2.1 1.17 2.83l-1.41 1.41zm8.48 0l-1.41-1.41C15.55 14.1 16 13.1 16 12c0-1.1-.45-2.1-1.17-2.83l1.41-1.41C17.33 8.84 18 10.34 18 12s-.67 3.16-1.76 4.24zM12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-7 2c0-1.93.78-3.68 2.05-4.95l-1.42-1.42C4.01 7.26 3 9.51 3 12s1.01 4.74 2.64 6.36l1.42-1.42C5.78 15.68 5 13.93 5 12zm14.36 0c0 1.93-.78 3.68-2.05 4.95l1.41 1.41C21 16.74 22 14.49 22 12s-1.01-4.74-2.64-6.36l-1.41 1.41C19.22 8.32 20 10.07 20 12z"/></g>
  <text x="115" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">A02YYUW Sensor</text>
  <text x="115" y="190" text-anchor="middle" font-size="10" fill="#9a3412">IP67 · UART · 9600 baud</text>
  <line x1="40" y1="200" x2="196" y2="200" stroke="#fed7aa"/>
  <!-- Wire rows with color swatches -->
  <rect x="36" y="208" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="52" y="218" font-size="11" fill="#9a3412">VCC (red)</text>
  <rect x="36" y="228" width="10" height="10" rx="2" fill="#1e293b"/>
  <text x="52" y="238" font-size="11" fill="#9a3412">GND (black)</text>
  <rect x="36" y="248" width="10" height="10" rx="2" fill="#ca8a04"/>
  <text x="52" y="258" font-size="11" fill="#9a3412">RX → GND (yellow)</text>
  <rect x="36" y="268" width="10" height="10" rx="2" fill="#e2e8f0"/>
  <rect x="36" y="268" width="10" height="10" rx="2" fill="none" stroke="#64748b"/>
  <text x="52" y="278" font-size="11" fill="#9a3412">TX (white)</text>
  <text x="115" y="300" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">cut PH2.0 · crimp DuPont</text>

  <!-- Right: FXP73 antenna -->
  <rect x="560" y="120" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(576,134) scale(0.55)" fill="#14532d"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="660" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Taoglas FXP73</text>
  <text x="660" y="170" text-anchor="middle" font-size="10" fill="#166534">LTE/NB-IoT · u.FL · adhesive</text>
  <text x="660" y="188" text-anchor="middle" font-size="10" fill="#166534">adhere inside lid (RF-transparent)</text>

  <!-- Connection lines -->
  <!-- Red: VCC → +3V3_OUT -->
  <line x1="210" y1="213" x2="306" y2="208" stroke="#ef4444" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>
  <!-- Black+Yellow: GND → GND -->
  <line x1="210" y1="248" x2="306" y2="248" stroke="#475569" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-slate)"/>
  <!-- White: TX → RX -->
  <line x1="210" y1="273" x2="306" y2="288" stroke="#94a3b8" stroke-opacity="0.8" stroke-width="2" marker-end="url(#ar-blue)"/>
  <!-- Antenna: u.FL -->
  <line x1="560" y1="160" x2="494" y2="164" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-slate)"/>

  <!-- Power chain bottom -->
  <rect x="30" y="420" width="740" height="78" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(40,428) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="68" y="444" font-size="12" font-weight="700" fill="#713f12">Power path</text>

  <rect x="50" y="454" width="150" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="125" y="476" text-anchor="middle" font-size="11" fill="#713f12">5 V DC wall adapter</text>

  <rect x="244" y="454" width="170" height="34" rx="4" fill="#ffffff" stroke="#a16207" stroke-dasharray="4 2"/>
  <text x="329" y="471" text-anchor="middle" font-size="11" fill="#713f12">Mojo (bench only)</text>
  <text x="329" y="483" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">BAT ← adapter · LOAD → CX</text>

  <rect x="468" y="454" width="150" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="543" y="476" text-anchor="middle" font-size="11" fill="#713f12">CX +VBAT pad</text>

  <rect x="668" y="454" width="90" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="713" y="476" text-anchor="middle" font-size="11" fill="#713f12">GND</text>

  <line x1="200" y1="471" x2="242" y2="471" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="414" y1="471" x2="466" y2="471" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="618" y1="471" x2="666" y2="471" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>

  <!-- Power line from +VBAT pad up to CX -->
  <line x1="400" y1="420" x2="400" y2="384" stroke="#a16207" stroke-opacity="0.4" stroke-width="2" marker-end="url(#ar-brown)"/>
</svg>
