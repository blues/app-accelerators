<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="860" height="460" fill="#ffffff"/>

  <text x="430" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Data Flow</text>
  <text x="430" y="58" text-anchor="middle" font-size="12" fill="#64748b">Poll · evaluate · emit — three Notefiles, two alert timing categories</text>

  <!-- Poll -->
  <rect x="20" y="100" width="160" height="230" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(96,115) scale(0.75)" fill="#312e81"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></g>
  <text x="100" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Poll</text>
  <text x="100" y="171" text-anchor="middle" font-size="11" fill="#3730a3">every minute</text>
  <line x1="40" y1="186" x2="160" y2="186" stroke="#c7d2fe"/>
  <g font-size="10" fill="#312e81">
    <text x="100" y="208" text-anchor="middle">7 holding registers</text>
    <text x="100" y="228" text-anchor="middle">RPM · fuel · load</text>
    <text x="100" y="248" text-anchor="middle">oil · coolant</text>
    <text x="100" y="268" text-anchor="middle">run hours · alarm</text>
    <text x="100" y="292" text-anchor="middle" font-style="italic">all-or-nothing</text>
    <text x="100" y="308" text-anchor="middle" font-style="italic">with 3× retry</text>
  </g>

  <!-- Per-poll rules -->
  <rect x="210" y="100" width="180" height="145" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="300" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Per-poll rules</text>
  <text x="300" y="142" text-anchor="middle" font-size="10" fill="#991b1b">~1 min latency</text>
  <line x1="228" y1="152" x2="372" y2="152" stroke="#fca5a5"/>
  <g font-size="10" fill="#7f1d1d">
    <text x="300" y="174" text-anchor="middle">controller_alarm</text>
    <text x="300" y="194" text-anchor="middle">failure_to_start</text>
    <text x="300" y="214" text-anchor="middle">modbus_unreachable</text>
    <text x="300" y="234" text-anchor="middle" font-style="italic">alarm-word transition</text>
  </g>

  <!-- Report-window rules -->
  <rect x="210" y="265" width="180" height="155" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="300" y="291" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Report-window rules</text>
  <text x="300" y="307" text-anchor="middle" font-size="10" fill="#c2410c">up to 60 min latency</text>
  <line x1="228" y1="317" x2="372" y2="317" stroke="#fed7aa"/>
  <g font-size="10" fill="#9a3412">
    <text x="300" y="339" text-anchor="middle">fuel_low</text>
    <text x="300" y="359" text-anchor="middle">coolant_overtemp</text>
    <text x="300" y="379" text-anchor="middle">oil_low_pressure</text>
    <text x="300" y="404" text-anchor="middle" font-style="italic">rolling window aggregates</text>
  </g>

  <!-- gen_event.qo -->
  <rect x="430" y="100" width="180" height="78" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(506,112) scale(0.65)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="520" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">gen_event.qo</text>
  <text x="520" y="168" text-anchor="middle" font-size="10" fill="#991b1b">sync:true · immediate</text>

  <!-- gen_alarm_log.qo -->
  <rect x="430" y="194" width="180" height="82" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="520" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">gen_alarm_log.qo</text>
  <text x="520" y="250" text-anchor="middle" font-size="10" fill="#b45309">batched · alarm history</text>
  <text x="520" y="267" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">shares real-time route</text>

  <!-- gen_summary.qo -->
  <rect x="430" y="308" width="180" height="78" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(506,320) scale(0.65)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="520" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">gen_summary.qo</text>
  <text x="520" y="374" text-anchor="middle" font-size="10" fill="#166534">hourly · templated</text>

  <!-- Notehub -->
  <rect x="650" y="148" width="190" height="218" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(726,190) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="745" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <text x="745" y="256" text-anchor="middle" font-size="11" fill="#1e40af">+ routes</text>
  <line x1="668" y1="270" x2="830" y2="270" stroke="#bfdbfe"/>
  <g font-size="10" fill="#1e40af">
    <text x="745" y="292" text-anchor="middle">gen_event.qo → CMMS</text>
    <text x="745" y="310" text-anchor="middle">or on-call paging</text>
    <text x="745" y="328" text-anchor="middle">gen_alarm_log.qo → same</text>
    <text x="745" y="348" text-anchor="middle">gen_summary.qo → trend</text>
  </g>

  <!-- Arrows: Poll → per-poll rules -->
  <line x1="180" y1="175" x2="208" y2="175" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <!-- Arrows: Poll → report-window rules -->
  <line x1="180" y1="295" x2="208" y2="330" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <!-- Arrows: per-poll → gen_event.qo -->
  <line x1="390" y1="160" x2="428" y2="145" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Arrows: per-poll → gen_alarm_log.qo (dashed: alarm transitions feed the history log, flushed at report boundary) -->
  <line x1="390" y1="205" x2="428" y2="232" stroke="#d97706" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ar-amber)"/>

  <!-- Arrows: report-window rules → gen_event.qo (threshold trips fire immediate events via sendEvent()) -->
  <line x1="390" y1="285" x2="430" y2="165" stroke="#ea580c" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-orange)"/>

  <!-- Arrows: report boundary → gen_summary.qo -->
  <line x1="300" y1="245" x2="300" y2="262" stroke="#475569" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="390" y1="350" x2="428" y2="350" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Arrows: gen_event.qo → Notehub -->
  <line x1="610" y1="140" x2="648" y2="200" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Arrows: gen_alarm_log.qo → Notehub -->
  <line x1="610" y1="235" x2="648" y2="268" stroke="#d97706" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-amber)"/>

  <!-- Arrows: gen_summary.qo → Notehub -->
  <line x1="610" y1="348" x2="648" y2="328" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <text x="430" y="435" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Three Notefiles: gen_event.qo (sync:true · immediate), gen_alarm_log.qo (batched · shares real-time route), gen_summary.qo (hourly · trend store).</text>
</svg>
