<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="560" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Signal pinout on the Notecarrier CX + relay circuit</text>

  <!-- Notecarrier CX center -->
  <rect x="300" y="90" width="200" height="300" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,106) scale(0.75)" fill="#0f172a">
    <path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/>
  </g>
  <text x="400" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="166" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet STM32 · Notecard for Skylo</text>

  <!-- Pin labels and dots on Notecarrier CX -->
  <g font-size="11" fill="#0f172a">
    <text x="315" y="210">A1</text>
    <text x="315" y="280">A2</text>
    <text x="487" y="210" text-anchor="end">MAIN</text>
    <text x="487" y="280" text-anchor="end">GPS</text>
    <text x="400" y="380" text-anchor="middle">+VBAT</text>
  </g>
  <circle cx="300" cy="206" r="4" fill="#ef4444"/>
  <circle cx="300" cy="276" r="4" fill="#f59e0b"/>
  <circle cx="500" cy="206" r="4" fill="#9333ea"/>
  <circle cx="500" cy="276" r="4" fill="#10b981"/>
  <circle cx="400" cy="390" r="4" fill="#3b82f6"/>

  <!-- Left: Relay driver circuit (A1) -->
  <rect x="30" y="170" width="185" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(46,182) scale(0.55)" fill="#7f1d1d">
    <path d="M5 13h10v-2H5v2zm0 4h10v-2H5v2zm0-8h10V7H5v2zm14 4l-3-3v2h-3v2h3v2l3-3zm-14-8h10V3H5v2z"/>
  </g>
  <text x="125" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Relay driver</text>
  <text x="125" y="218" text-anchor="middle" font-size="10" fill="#991b1b">BSS138 gate; 10 kΩ pulldown</text>
  <text x="125" y="234" text-anchor="middle" font-size="10" fill="#991b1b">SPDT relay; 1N4007 flyback</text>
  <text x="125" y="250" text-anchor="middle" font-size="10" fill="#991b1b">1–2 A fuse on 12 V feed</text>

  <!-- Left: Ignition sense (A2) -->
  <rect x="30" y="280" width="185" height="70" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <g transform="translate(46,292) scale(0.55)" fill="#7c2d12">
    <path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/>
  </g>
  <text x="125" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Ignition sense</text>
  <text x="125" y="326" text-anchor="middle" font-size="10" fill="#9a3412">33 kΩ / 10 kΩ divider</text>
  <text x="125" y="342" text-anchor="middle" font-size="10" fill="#9a3412">12 V → ~2.79 V at A2</text>

  <!-- Right: Skylo antenna (MAIN) -->
  <rect x="585" y="170" width="185" height="70" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(601,182) scale(0.55)" fill="#581c87">
    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
  </g>
  <text x="677" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">Skylo antenna</text>
  <text x="677" y="218" text-anchor="middle" font-size="10" fill="#6b21a8">Certified kit antenna only</text>
  <text x="677" y="234" text-anchor="middle" font-size="10" fill="#6b21a8">u.FL → MAIN port</text>

  <!-- Right: GNSS antenna (GPS) -->
  <rect x="585" y="260" width="185" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <g transform="translate(601,272) scale(0.55)" fill="#064e3b">
    <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
  </g>
  <text x="677" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">GNSS patch antenna</text>
  <text x="677" y="306" text-anchor="middle" font-size="10" fill="#065f46">Passive GPS L1 1575 MHz</text>
  <text x="677" y="322" text-anchor="middle" font-size="10" fill="#065f46">u.FL → GPS port</text>

  <!-- Connection arrows -->
  <line x1="215" y1="206" x2="296" y2="206" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="215" y1="276" x2="296" y2="276" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="585" y1="206" x2="504" y2="206" stroke="#9333ea" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-purple)"/>
  <line x1="585" y1="276" x2="504" y2="276" stroke="#10b981" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Power chain at bottom -->
  <rect x="30" y="455" width="740" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(42,463) scale(0.65)" fill="#713f12">
    <path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/>
  </g>
  <text x="72" y="478" font-size="12" font-weight="700" fill="#713f12">Power chain</text>

  <rect x="50" y="490" width="110" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="105" y="512" text-anchor="middle" font-size="11" fill="#713f12">Solar panel</text>

  <rect x="200" y="490" width="130" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="265" y="512" text-anchor="middle" font-size="11" fill="#713f12">Solar LiPo charger</text>

  <rect x="380" y="490" width="80" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="420" y="512" text-anchor="middle" font-size="11" fill="#713f12">LiPo cell</text>

  <rect x="510" y="490" width="80" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="550" y="505" text-anchor="middle" font-size="11" fill="#713f12">Mojo</text>
  <text x="550" y="519" text-anchor="middle" font-size="9" fill="#a16207">(bench only)</text>

  <rect x="640" y="490" width="120" height="34" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="700" y="512" text-anchor="middle" font-size="11" fill="#713f12">Notecarrier +VBAT</text>

  <line x1="160" y1="507" x2="198" y2="507" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="330" y1="507" x2="378" y2="507" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="460" y1="507" x2="508" y2="507" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="590" y1="507" x2="638" y2="507" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>

  <!-- Relay output label -->
  <text x="125" y="150" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">→ NC contact in series with</text>
  <text x="125" y="163" text-anchor="middle" font-size="10" fill="#991b1b" font-style="italic">starter solenoid enable wire</text>
</svg>
