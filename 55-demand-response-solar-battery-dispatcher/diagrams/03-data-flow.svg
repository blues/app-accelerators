<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="ar-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="800" height="440" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Dispatch &amp; Data Flow</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Inbound dispatch · mode resolution · outbound telemetry and events</text>

  <!-- Poll + Dispatch (left) -->
  <rect x="20" y="90" width="175" height="210" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(98,105) scale(0.75)" fill="#312e81"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></g>
  <text x="108" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Poll + Dispatch</text>
  <line x1="35" y1="165" x2="180" y2="165" stroke="#c7d2fe"/>
  <g font-size="11" fill="#312e81">
    <text x="108" y="188" text-anchor="middle" font-weight="600">Modbus RTU</text>
    <text x="108" y="208" text-anchor="middle">Inverter + BMS</text>
    <text x="108" y="228" text-anchor="middle">every sample_minutes</text>
  </g>
  <line x1="35" y1="243" x2="180" y2="243" stroke="#c7d2fe" stroke-dasharray="4,3"/>
  <g font-size="11" fill="#312e81">
    <text x="108" y="262" text-anchor="middle" font-weight="600">dispatch.qi</text>
    <text x="108" y="282" text-anchor="middle">note.get / pop</text>
    <text x="108" y="298" text-anchor="middle">each sample cycle</text>
  </g>

  <!-- Mode Resolution (middle) -->
  <rect x="238" y="90" width="195" height="210" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(326,105) scale(0.75)" fill="#713f12"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></g>
  <text x="335" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Mode Resolution</text>
  <line x1="253" y1="165" x2="418" y2="165" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="335" y="185" text-anchor="middle">1. Cloud dispatch</text>
    <text x="335" y="203" text-anchor="middle">  (g_commanded_mode)</text>
    <text x="335" y="223" text-anchor="middle">2. TOU schedule</text>
    <text x="335" y="241" text-anchor="middle">  peak / off-peak windows</text>
    <text x="335" y="261" text-anchor="middle">3. Lower SOC guard</text>
    <text x="335" y="279" text-anchor="middle">  soc_min + soc_hyst</text>
    <text x="335" y="297" text-anchor="middle">→ applyRelays() + 4 relays</text>
  </g>

  <!-- solar_telemetry.qo (top right) -->
  <rect x="482" y="90" width="175" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(560,100) scale(0.65)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="570" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">solar_telemetry.qo</text>
  <text x="570" y="158" text-anchor="middle" font-size="10" fill="#166534">every report_minutes · templated</text>
  <text x="570" y="172" text-anchor="middle" font-size="10" fill="#166534">pv_w · ac_out_w · grid_w · SOC · mode</text>

  <!-- dr_event.qo (bottom right) -->
  <rect x="482" y="210" width="175" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(560,220) scale(0.65)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="570" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">dr_event.qo</text>
  <text x="570" y="276" text-anchor="middle" font-size="10" fill="#991b1b">sync:true · immediate on transition</text>
  <text x="570" y="290" text-anchor="middle" font-size="10" fill="#991b1b">new_mode · prev_mode · SOC · PV · grid</text>

  <!-- Notehub -->
  <rect x="692" y="130" width="95" height="130" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(730,140) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="740" y="182" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <text x="740" y="200" text-anchor="middle" font-size="11" fill="#1e40af">+ routes</text>
  <line x1="702" y1="215" x2="777" y2="215" stroke="#bfdbfe"/>
  <text x="740" y="233" text-anchor="middle" font-size="10" fill="#1e40af">historian</text>
  <text x="740" y="249" text-anchor="middle" font-size="10" fill="#1e40af">SCADA / CMMS</text>

  <!-- Arrows: Poll → Mode Resolution -->
  <line x1="195" y1="195" x2="236" y2="195" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <!-- Mode Resolution → solar_telemetry -->
  <line x1="433" y1="150" x2="480" y2="140" stroke="#16a34a" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Mode Resolution → dr_event -->
  <line x1="433" y1="240" x2="480" y2="255" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- solar_telemetry → Notehub -->
  <line x1="657" y1="140" x2="690" y2="175" stroke="#16a34a" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- dr_event → Notehub -->
  <line x1="657" y1="255" x2="690" y2="225" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Inbound dispatch arrow from Notehub back to Poll+Dispatch (looping left) -->
  <path d="M 740 130 C 740 75, 108 75, 108 88" stroke="#2563eb" stroke-opacity="0.5" stroke-width="2" fill="none" marker-end="url(#ar-blue)"/>
  <text x="420" y="68" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">dispatch.qi inbound (Notecard ≤5 min)</text>

  <!-- Upper SOC guard annotation inside mode resolution box -->
  <rect x="248" y="325" width="175" height="48" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
  <text x="335" y="343" text-anchor="middle" font-size="10" font-weight="700" fill="#7c2d12">Upper SOC guard (applyRelays)</text>
  <text x="335" y="359" text-anchor="middle" font-size="10" fill="#9a3412">soc_max − soc_max_hyst deadband</text>
  <text x="335" y="371" text-anchor="middle" font-size="10" fill="#9a3412">prevents RELAY3 chatter at ceiling</text>

  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Two Notefiles, two routes — telemetry to historian, events to real-time alerting channel.</text>
</svg>
