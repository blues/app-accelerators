<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Dispatch &amp; Data Flow</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Inbound dispatch · mode resolution · outbound telemetry &amp; events</text>

  <!-- Poll + Dispatch -->
  <rect x="20" y="120" width="200" height="180" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(111,135) scale(0.75)" fill="#312e81"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></g>
  <text x="120" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Poll + Dispatch</text>
  <line x1="40" y1="186" x2="200" y2="186" stroke="#c7d2fe"/>
  <g font-size="11" fill="#312e81">
    <text x="120" y="212" text-anchor="middle">Modbus poll</text>
    <text x="120" y="234" text-anchor="middle">inverter + BMS</text>
    <text x="120" y="256" text-anchor="middle">dispatch.qi pop</text>
    <text x="120" y="278" text-anchor="middle">each cycle</text>
  </g>

  <!-- Mode Resolution -->
  <rect x="250" y="120" width="200" height="180" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(341,135) scale(0.75)" fill="#713f12"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></g>
  <text x="350" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Mode resolver</text>
  <line x1="270" y1="186" x2="430" y2="186" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="350" y="212" text-anchor="middle">1 · cloud dispatch</text>
    <text x="350" y="234" text-anchor="middle">2 · TOU schedule</text>
    <text x="350" y="256" text-anchor="middle">3 · SOC guard</text>
    <text x="350" y="278" text-anchor="middle" font-style="italic">→ applyRelays()</text>
  </g>

  <!-- Telemetry (top right) -->
  <rect x="480" y="120" width="170" height="80" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(556,130) scale(0.65)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="565" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">solar_telemetry.qo</text>
  <text x="565" y="186" text-anchor="middle" font-size="10" fill="#166534">every 15 min · templated</text>

  <!-- DR Event (bottom right) -->
  <rect x="480" y="220" width="170" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(556,230) scale(0.65)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="565" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">dr_event.qo</text>
  <text x="565" y="286" text-anchor="middle" font-size="10" fill="#991b1b">sync:true · on transition</text>

  <!-- Notehub -->
  <rect x="680" y="120" width="100" height="180" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(720,180) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="730" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <text x="730" y="240" text-anchor="middle" font-size="11" fill="#1e40af">+ routes</text>

  <!-- Outbound arrows -->
  <line x1="220" y1="210" x2="248" y2="210" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="450" y1="170" x2="478" y2="160" stroke="#16a34a" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="450" y1="250" x2="478" y2="260" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="650" y1="160" x2="678" y2="180" stroke="#16a34a" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="650" y1="260" x2="678" y2="240" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Inbound dispatch loop (wraps around above the diagram) -->
  <path d="M 730 120 C 730 75 120 75 120 118" stroke="#2563eb" stroke-opacity="0.5" stroke-width="2" fill="none" marker-end="url(#ar-blue)"/>
  <text x="425" y="92" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="600">dispatch.qi inbound (≤ 5 min)</text>

  <!-- Footer note about deadband -->
  <rect x="20" y="340" width="760" height="60" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
  <text x="400" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Upper-SOC deadband (applyRelays)</text>
  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#9a3412">soc_max − soc_max_hyst prevents RELAY3 chatter near the charge ceiling</text>
  <text x="400" y="394" text-anchor="middle" font-size="10" fill="#9a3412" font-style="italic">latch operates without changing resolved mode — does not generate dr_event.qo</text>

  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Two Notefiles, two routes — telemetry to historian, events to real-time alerting channel.</text>
</svg>
