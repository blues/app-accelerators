<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">DIN-rail layout · RS-485 daisy-chain · relay outputs · 24 VDC panel power</text>

  <!-- 24V supply -->
  <rect x="20" y="100" width="130" height="110" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(76,112) scale(0.65)" fill="#7c2d12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="85" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">24 VDC Supply</text>
  <text x="85" y="168" text-anchor="middle" font-size="11" fill="#9a3412">HDR-15-24</text>
  <text x="85" y="200" text-anchor="middle" font-size="10" fill="#c2410c" font-style="italic">often in panel</text>

  <!-- OPTA -->
  <rect x="175" y="100" width="170" height="110" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(251,112) scale(0.65)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="260" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Arduino OPTA</text>
  <text x="260" y="166" text-anchor="middle" font-size="11" fill="#854d0e">RS485 variant</text>
  <line x1="190" y1="180" x2="330" y2="180" stroke="#fde68a"/>
  <text x="260" y="198" text-anchor="middle" font-size="11" fill="#854d0e">+24 V · GND · A · B · COM</text>

  <!-- Wireless for OPTA -->
  <rect x="370" y="100" width="175" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(448,112) scale(0.65)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="458" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Wireless for OPTA</text>
  <text x="458" y="166" text-anchor="middle" font-size="11" fill="#1e40af">expansion + Notecard</text>
  <line x1="385" y1="180" x2="530" y2="180" stroke="#bfdbfe"/>
  <text x="458" y="198" text-anchor="middle" font-size="11" fill="#1e40af">SMA × 2 · +24 V shared</text>

  <!-- Antennas -->
  <rect x="570" y="100" width="110" height="110" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <g transform="translate(616,112) scale(0.65)" fill="#0f172a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="625" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Antennas</text>
  <text x="625" y="168" text-anchor="middle" font-size="11" fill="#334155">primary + diversity</text>
  <text x="625" y="188" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">via cable glands</text>
  <text x="625" y="204" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">outside cabinet</text>

  <!-- Power arrow: supply → OPTA -->
  <line x1="150" y1="155" x2="173" y2="155" stroke="#a16207" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-brown)"/>
  <text x="161" y="146" text-anchor="middle" font-size="9" fill="#a16207">+24 V</text>

  <!-- I²C arrow: OPTA → Wireless -->
  <line x1="345" y1="155" x2="368" y2="155" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <text x="357" y="146" text-anchor="middle" font-size="9" fill="#475569">I²C</text>

  <!-- Antenna arrow: Wireless → Antennas -->
  <line x1="545" y1="155" x2="568" y2="155" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <text x="557" y="146" text-anchor="middle" font-size="9" fill="#475569">SMA</text>

  <!-- RS-485 bus label -->
  <text x="260" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">RS-485 Modbus Bus (daisy-chain)</text>

  <!-- RS-485 bus: OPTA end terminator -->
  <rect x="175" y="268" width="75" height="60" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="212" y="294" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">OPTA</text>
  <text x="212" y="314" text-anchor="middle" font-size="10" fill="#991b1b">A · B · COM</text>

  <!-- 120 Ω terminator (OPTA end) -->
  <rect x="260" y="278" width="55" height="40" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="288" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">120 Ω</text>
  <text x="288" y="312" text-anchor="middle" font-size="9" fill="#854d0e">terminator</text>

  <!-- Inverter -->
  <rect x="330" y="268" width="100" height="60" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="380" y="294" text-anchor="middle" font-size="11" font-weight="700" fill="#312e81">Inverter</text>
  <text x="380" y="312" text-anchor="middle" font-size="10" fill="#3730a3">ID 1 · A · B · GND</text>

  <!-- BMS -->
  <rect x="450" y="268" width="100" height="60" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="500" y="294" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">BMS</text>
  <text x="500" y="312" text-anchor="middle" font-size="10" fill="#166534">ID 2 · A · B · GND</text>

  <!-- 120 Ω terminator (far end) -->
  <rect x="565" y="278" width="55" height="40" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="593" y="298" text-anchor="middle" font-size="10" font-weight="700" fill="#854d0e">120 Ω</text>
  <text x="593" y="312" text-anchor="middle" font-size="9" fill="#854d0e">terminator</text>

  <!-- RS-485 bus lines -->
  <line x1="250" y1="298" x2="260" y2="298" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2"/>
  <line x1="315" y1="298" x2="330" y2="298" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="430" y1="298" x2="450" y2="298" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="550" y1="298" x2="565" y2="298" stroke="#dc2626" stroke-opacity="0.6" stroke-width="2"/>

  <!-- OPTA down arrow to RS-485 bus segment -->
  <line x1="260" y1="210" x2="260" y2="265" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>

  <!-- Relay outputs section -->
  <text x="260" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Relay Outputs (COM + NO → dry-contact inputs)</text>

  <rect x="20" y="382" width="165" height="88" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="103" y="402" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">RELAY1 &amp; RELAY2</text>
  <line x1="30" y1="410" x2="175" y2="410" stroke="#86efac"/>
  <text x="103" y="428" text-anchor="middle" font-size="10" fill="#166534">R1 → Inverter Grid Export</text>
  <text x="103" y="446" text-anchor="middle" font-size="10" fill="#166534">Enable dry-contact input</text>
  <text x="103" y="462" text-anchor="middle" font-size="10" fill="#166534">R2 → BMS Discharge Enable</text>

  <rect x="202" y="382" width="165" height="88" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="285" y="402" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">RELAY3 &amp; RELAY4</text>
  <line x1="212" y1="410" x2="357" y2="410" stroke="#86efac"/>
  <text x="285" y="428" text-anchor="middle" font-size="10" fill="#166534">R3 → BMS Charge Enable</text>
  <text x="285" y="446" text-anchor="middle" font-size="10" fill="#166534">dry-contact input</text>
  <text x="285" y="462" text-anchor="middle" font-size="10" fill="#166534">R4 → SCADA / DR indicator</text>

  <!-- Relay fail-safe note -->
  <rect x="384" y="382" width="400" height="88" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
  <text x="584" y="402" text-anchor="middle" font-size="11" font-weight="700" fill="#7c2d12">Fail-safe (de-energised state)</text>
  <line x1="394" y1="410" x2="774" y2="410" stroke="#fed7aa"/>
  <g font-size="10" fill="#9a3412">
    <text x="584" y="426" text-anchor="middle">R1 open → export curtailed   R2 open → discharge blocked</text>
    <text x="584" y="444" text-anchor="middle">R3 open → charge inhibited   R4 open → DR indicator off</text>
    <text x="584" y="462" text-anchor="middle">All relays de-energise on power loss, reset, or startup.</text>
  </g>
</svg>
