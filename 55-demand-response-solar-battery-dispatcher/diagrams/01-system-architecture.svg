<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ar-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">System Architecture</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Demand-Response Solar + Battery Dispatcher</text>

  <!-- Connection labels ABOVE box vertical range -->
  <text x="195" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">RS-485 Modbus</text>
  <text x="430" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">I²C / AUX</text>
  <text x="660" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">cellular / sat</text>

  <!-- Field Devices -->
  <rect x="20" y="120" width="160" height="200" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <g transform="translate(91,135) scale(0.75)" fill="#312e81"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></g>
  <text x="100" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Field devices</text>
  <line x1="40" y1="186" x2="160" y2="186" stroke="#c7d2fe"/>
  <g font-size="11" fill="#3730a3">
    <text x="100" y="214" text-anchor="middle">Inverter (ID 1)</text>
    <text x="100" y="236" text-anchor="middle">BMS (ID 2)</text>
    <text x="100" y="258" text-anchor="middle">PV · AC · grid</text>
    <text x="100" y="280" text-anchor="middle">SOC · V · A</text>
  </g>

  <!-- Arduino OPTA -->
  <rect x="210" y="120" width="180" height="200" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(291,135) scale(0.75)" fill="#713f12"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="300" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">Arduino OPTA</text>
  <line x1="230" y1="186" x2="370" y2="186" stroke="#fde68a"/>
  <g font-size="11" fill="#854d0e">
    <text x="300" y="214" text-anchor="middle">Modbus client</text>
    <text x="300" y="236" text-anchor="middle">Mode resolver</text>
    <text x="300" y="258" text-anchor="middle">4 relay outputs</text>
  </g>
  <text x="300" y="298" text-anchor="middle" font-size="10" fill="#a16207" font-style="italic">control logic on Cygnet</text>

  <!-- Wireless for OPTA -->
  <rect x="420" y="120" width="180" height="200" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(501,135) scale(0.75)" fill="#1e3a8a"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></g>
  <text x="510" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Wireless for OPTA</text>
  <line x1="440" y1="186" x2="580" y2="186" stroke="#bfdbfe"/>
  <g font-size="11" fill="#1e40af">
    <text x="510" y="214" text-anchor="middle">Notecard Cell+WiFi</text>
    <text x="510" y="236" text-anchor="middle">Note queue</text>
    <text x="510" y="258" text-anchor="middle">5-min inbound</text>
  </g>

  <!-- Notehub -->
  <rect x="630" y="120" width="150" height="200" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/>
  <g transform="translate(696,135) scale(0.75)" fill="#581c87"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="705" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">Notehub</text>
  <line x1="645" y1="186" x2="765" y2="186" stroke="#e9d5ff"/>
  <g font-size="11" fill="#6b21a8">
    <text x="705" y="214" text-anchor="middle">Routing</text>
    <text x="705" y="236" text-anchor="middle">Env vars</text>
    <text x="705" y="258" text-anchor="middle">Fleet config</text>
  </g>

  <!-- Outbound arrows -->
  <line x1="180" y1="220" x2="208" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="390" y1="220" x2="418" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="600" y1="220" x2="628" y2="220" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>

  <!-- 4 Relay outputs -->
  <rect x="195" y="346" width="210" height="80" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="300" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">4 relay outputs</text>
  <g font-size="10" fill="#166534">
    <text x="300" y="388" text-anchor="middle">R1 export · R2 discharge</text>
    <text x="300" y="404" text-anchor="middle">R3 charge · R4 DR indicator</text>
    <text x="300" y="420" text-anchor="middle" font-style="italic">fail-safe: open on power loss</text>
  </g>
  <line x1="300" y1="320" x2="300" y2="344" stroke="#16a34a" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- DR Cloud command path -->
  <rect x="630" y="346" width="150" height="80" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="705" y="368" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">DR Cloud / EMS</text>
  <g font-size="10" fill="#334155">
    <text x="705" y="388" text-anchor="middle">rate scheduler</text>
    <text x="705" y="404" text-anchor="middle">utility DR API</text>
    <text x="705" y="420" text-anchor="middle" font-style="italic">posts dispatch.qi</text>
  </g>
  <line x1="705" y1="344" x2="705" y2="320" stroke="#9333ea" stroke-opacity="0.6" stroke-width="2" marker-end="url(#ar-purple)"/>

  <text x="400" y="450" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Independent cellular control channel — no building LAN, no IT coordination required.</text>
</svg>
