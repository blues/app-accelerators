<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
    <marker id="ar-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3b82f6"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="ar-brown" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a16207"/>
    </marker>
  </defs>
  <rect width="800" height="540" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Wiring &amp; Assembly</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Sensor pinout on the Notecarrier CX</text>

  <!-- Notecarrier CX center -->
  <rect x="320" y="100" width="160" height="280" rx="10" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <g transform="translate(391,115) scale(0.75)" fill="#0f172a"><path d="M15 9H9v6h6V9zm-2 4h-2v-2h2v2zm8-2V9h-2V7c0-1.1-.9-2-2-2h-2V3h-2v2h-2V3H9v2H7c-1.1 0-2 .9-2 2v2H3v2h2v2H3v2h2v2c0 1.1.9 2 2 2h2v2h2v-2h2v2h2v-2h2c1.1 0 2-.9 2-2v-2h2v-2h-2v-2h2zm-4 6H7V7h10v10z"/></g>
  <text x="400" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Notecarrier CX</text>
  <text x="400" y="170" text-anchor="middle" font-size="10" fill="#475569">+ Cygnet · MBGLW</text>

  <g font-size="11" fill="#0f172a">
    <text x="335" y="204">A0</text>
    <text x="335" y="284">A1</text>
    <text x="465" y="204" text-anchor="end">A2</text>
    <text x="465" y="284" text-anchor="end">SDA/SCL</text>
    <text x="400" y="358" text-anchor="middle">+VBAT</text>
  </g>
  <g>
    <circle cx="320" cy="200" r="4" fill="#f59e0b"/>
    <circle cx="320" cy="280" r="4" fill="#3b82f6"/>
    <circle cx="480" cy="200" r="4" fill="#ef4444"/>
    <circle cx="480" cy="280" r="4" fill="#10b981"/>
    <circle cx="400" cy="380" r="4" fill="#0ea5e9"/>
  </g>

  <!-- Left: Supply thermistor -->
  <rect x="40" y="170" width="180" height="60" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <g transform="translate(56,184) scale(0.55)" fill="#7c2d12"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4z"/></g>
  <text x="135" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Supply thermistor</text>
  <text x="135" y="218" text-anchor="middle" font-size="10" fill="#9a3412">10 kΩ NTC + divider</text>

  <!-- Left: Return thermistor -->
  <rect x="40" y="250" width="180" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <g transform="translate(56,264) scale(0.55)" fill="#1e3a8a"><path d="M15 13V5c0-1.66-1.34-3-3-3S9 3.34 9 5v8c-1.21.91-2 2.37-2 4 0 2.76 2.24 5 5 5s5-2.24 5-5c0-1.63-.79-3.09-2-4z"/></g>
  <text x="135" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Return thermistor</text>
  <text x="135" y="298" text-anchor="middle" font-size="10" fill="#1e40af">10 kΩ NTC + divider</text>

  <!-- Right: CT -->
  <rect x="580" y="170" width="180" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <g transform="translate(596,184) scale(0.55)" fill="#7f1d1d"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Compressor CT</text>
  <text x="675" y="218" text-anchor="middle" font-size="10" fill="#991b1b">SCT-013 + V/2 bias</text>

  <!-- Right: SDP810 -->
  <rect x="580" y="250" width="180" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <g transform="translate(596,264) scale(0.55)" fill="#064e3b"><path d="M20.38 8.57l-1.23 1.85a8 8 0 0 1-.22 7.58H5.07A8 8 0 0 1 15.58 6.85l1.85-1.23A10 10 0 0 0 3.35 19a2 2 0 0 0 1.72 1h13.85a2 2 0 0 0 1.74-1 10 10 0 0 0-.27-10.44zm-9.79 6.84a2 2 0 0 0 2.83 0l5.66-8.49-8.49 5.66a2 2 0 0 0 0 2.83z"/></g>
  <text x="675" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Filter ΔP</text>
  <text x="675" y="298" text-anchor="middle" font-size="10" fill="#065f46">SDP810 (I²C)</text>

  <!-- Translucent connection lines -->
  <line x1="220" y1="200" x2="316" y2="200" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="220" y1="280" x2="316" y2="280" stroke="#3b82f6" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-blue)"/>
  <line x1="580" y1="200" x2="484" y2="200" stroke="#ef4444" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="580" y1="280" x2="484" y2="280" stroke="#10b981" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>

  <!-- Power chain bottom -->
  <rect x="40" y="430" width="720" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <g transform="translate(50,438) scale(0.65)" fill="#713f12"><path d="M11 21h-1l1-7H7.5c-.88 0-.33-.75-.31-.78C8.48 10.94 10.42 7.54 13.01 3h1l-1 7h3.51c.4 0 .62.19.4.66C12.97 17.55 11 21 11 21z"/></g>
  <text x="78" y="454" font-size="12" font-weight="700" fill="#713f12">Power path</text>

  <rect x="60" y="465" width="120" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="120" y="487" text-anchor="middle" font-size="11" fill="#713f12">120 VAC</text>

  <rect x="220" y="465" width="140" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="290" y="487" text-anchor="middle" font-size="11" fill="#713f12">IRM-03-5 (5 V)</text>

  <rect x="400" y="465" width="120" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="460" y="487" text-anchor="middle" font-size="11" fill="#713f12">Mojo</text>

  <rect x="560" y="465" width="180" height="35" rx="4" fill="#ffffff" stroke="#a16207"/>
  <text x="650" y="487" text-anchor="middle" font-size="11" fill="#713f12">Notecarrier +VBAT</text>

  <line x1="180" y1="482" x2="218" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="360" y1="482" x2="398" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
  <line x1="520" y1="482" x2="558" y2="482" stroke="#a16207" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-brown)"/>
</svg>
