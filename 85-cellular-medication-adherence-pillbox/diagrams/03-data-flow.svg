<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="ar-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="ar-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="ar-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="800" height="440" fill="#ffffff"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Data Flow</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#64748b">Sample · evaluate · emit</text>

  <!-- Sample box (blue) -->
  <rect x="20" y="100" width="160" height="220" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <g transform="translate(91,115) scale(0.75)" fill="#0c4a6e"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></g>
  <text x="100" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">Sample</text>
  <text x="100" y="174" text-anchor="middle" font-size="11" fill="#075985">every 30 s</text>
  <line x1="40" y1="188" x2="160" y2="188" stroke="#7dd3fc"/>
  <g font-size="11" fill="#0c4a6e">
    <text x="100" y="212" text-anchor="middle">7 lid pins</text>
    <text x="100" y="234" text-anchor="middle">XOR vs. prev mask</text>
    <text x="100" y="256" text-anchor="middle">rising-edge detect</text>
    <text x="100" y="278" text-anchor="middle">update day_opens</text>
  </g>

  <!-- Edge rules box (orange) -->
  <rect x="215" y="100" width="180" height="220" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <g transform="translate(296,115) scale(0.75)" fill="#7c2d12"><path d="M20 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9.6 13.6L7 13.2l1.4-1.4 2 2 4.6-4.6 1.4 1.4-6 6z"/></g>
  <text x="305" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Edge rules</text>
  <text x="305" y="174" text-anchor="middle" font-size="10" fill="#9a3412">per-poll evaluation</text>
  <line x1="235" y1="188" x2="375" y2="188" stroke="#fed7aa"/>
  <g font-size="11" fill="#7c2d12">
    <text x="305" y="212" text-anchor="middle">new lid open</text>
    <text x="305" y="234" text-anchor="middle">opens_this_poll mask</text>
    <text x="305" y="256" text-anchor="middle">UTC day rollover</text>
    <text x="305" y="278" text-anchor="middle" font-style="italic" fill="#b45309">retry queue overflow</text>
  </g>

  <!-- Open Notefile (red, top) -->
  <rect x="440" y="100" width="170" height="65" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <g transform="translate(516,109) scale(0.55)" fill="#7f1d1d"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></g>
  <text x="525" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">pill_open.qo</text>
  <text x="525" y="152" text-anchor="middle" font-size="10" fill="#991b1b">sync:true · per event</text>

  <!-- Summary Notefile (green, middle) -->
  <rect x="440" y="180" width="170" height="65" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <g transform="translate(516,189) scale(0.55)" fill="#14532d"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 17v-3h2v3H7zm4 0V7h2v10h-2zm4 0v-5h2v5h-2z"/></g>
  <text x="525" y="215" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">pill_summary.qo</text>
  <text x="525" y="232" text-anchor="middle" font-size="10" fill="#166534">daily · template</text>

  <!-- Diag Notefile (amber, bottom) -->
  <rect x="440" y="260" width="170" height="65" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <g transform="translate(516,269) scale(0.55)" fill="#713f12"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></g>
  <text x="525" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">pill_diag.qo</text>
  <text x="525" y="312" text-anchor="middle" font-size="10" fill="#92400e">overflow events</text>

  <!-- Notehub box (blue) -->
  <rect x="650" y="100" width="130" height="220" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <g transform="translate(706,180) scale(0.75)" fill="#1e3a8a"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></g>
  <text x="715" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Notehub</text>
  <text x="715" y="240" text-anchor="middle" font-size="11" fill="#1e40af">+ routes</text>

  <!-- Arrows -->
  <line x1="180" y1="210" x2="213" y2="210" stroke="#475569" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-gray)"/>
  <line x1="395" y1="155" x2="438" y2="135" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="395" y1="210" x2="438" y2="212" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="395" y1="265" x2="438" y2="290" stroke="#d97706" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>
  <line x1="610" y1="135" x2="648" y2="180" stroke="#dc2626" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-red)"/>
  <line x1="610" y1="212" x2="648" y2="212" stroke="#16a34a" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-green)"/>
  <line x1="610" y1="290" x2="648" y2="245" stroke="#d97706" stroke-opacity="0.5" stroke-width="2" marker-end="url(#ar-amber)"/>

  <text x="400" y="388" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">Open events skip the outbound queue · summaries arrive on the next sync · diagnostics flag data loss.</text>
</svg>
